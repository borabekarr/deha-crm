name: mobile-e2e
permissions:
  contents: read
on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - '.github/workflows/mobile-e2e.yml'
  push:
    branches: [main]
jobs:
  maestro:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Expo prebuild (account-free, no EAS)
        run: pnpm --filter @deha/mobile exec expo prebuild --platform ios --no-install --clean
      - name: Pod install
        run: pod install
        working-directory: apps/mobile/ios
      - name: Resolve scheme + build
        working-directory: apps/mobile
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name '*.xcworkspace' | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE  Scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build CODE_SIGNING_ALLOWED=NO | xcbeautify || exit 1
      - name: Boot simulator + install app
        working-directory: apps/mobile
        run: |
          APP_PATH=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name '*.app' | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app produced by xcodebuild"; exit 1
          fi
          xcrun simctl boot "iPhone 15" || true
          xcrun simctl install booted "$APP_PATH"
      - run: curl -Ls "https://get.maestro.mobile.dev" | bash
      - run: ~/.maestro/bin/maestro test maestro/
        working-directory: apps/mobile
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: ~/.maestro/tests/
