name: OSV-Scanner

on:
  pull_request:
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/osv-scanner.yml'
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  scan:
    name: Scan dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=./pnpm-lock.yaml
