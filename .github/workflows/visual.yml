name: Visual Regression

on:
  pull_request:
    branches:
      - main
      - 'feat/**'
  push:
    branches:
      - main
      - feat/ui-library
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - 'apps/web/design-system/**'
              - 'apps/web/src/components/design-system/**'
              - 'apps/web/tests/**'
              - 'apps/web/e2e/**'
              - 'apps/web/playwright.config.*'
              - 'apps/web/package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/visual.yml'

  visual:
    name: Playwright visual regression
    needs: changes
    if: needs.changes.outputs.ui == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @deha/web exec playwright install --with-deps chromium

      - name: Install Playwright OS dependencies (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @deha/web exec playwright install-deps chromium

      - name: Run visual regression suite
        run: pnpm --filter @deha/web test:e2e

      - name: Upload Playwright report and diff artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-visual-report
          if-no-files-found: ignore
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
            apps/web/tests/design-system.spec.ts-snapshots/
          retention-days: 14
