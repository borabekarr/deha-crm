<!doctype html>
<!-- @dsCard group="Brand" name="Index Bar" subtitle="CRM pipeline dashboard overview — metrics + stage index bar" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1" rel="stylesheet">
<style>
  body { background:#F8FAFC; }
  .card { padding:26px 22px 30px; background-image: radial-gradient(ellipse at top right, rgba(16,185,129,0.10) 0%, rgba(248,250,252,1) 55%, #FFFFFF 100%); }
  .material-icons, .material-symbols-outlined {
    font-weight:normal; font-style:normal; line-height:1; letter-spacing:normal; text-transform:none;
    display:inline-block; white-space:nowrap; word-wrap:normal; direction:ltr;
    -webkit-font-feature-settings:'liga'; font-feature-settings:'liga'; -webkit-font-smoothing:antialiased;
  }
  .material-icons { font-family:'Material Icons'; }
  .material-symbols-outlined { font-family:'Material Symbols Outlined'; }

  /* delta stat pills — green/red, matches "pills, chips & badges" (.badge success/danger) */
  .idx-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 10px; border-radius:9999px; font-family:'Montserrat'; font-size:12px; font-weight:800; line-height:1; color:#fff; }
  .idx-badge .material-icons { font-size:14px; }
  .idx-badge.up   { background:#10B981; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.14), inset 0 -1px 0 rgba(255,255,255,0.15); }
  .idx-badge.down { background:#EF4444; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.14), inset 0 -1px 0 rgba(255,255,255,0.15); }
  .sec { font-family:'Montserrat'; font-size:11px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--slate-500,#64748B); margin:2px 2px 4px; }
  .sec-sub { font-family:'Montserrat'; font-size:12px; font-weight:600; color:var(--slate-400,#94A3B8); margin:0 2px 18px; letter-spacing:-0.005em; }
  html.dark .sec { color:#94A3B8; } html.dark .sec-sub { color:#64748B; }

  /* ═══════════════════ STACKED COMPONENT ═══════════════════ */
  .idx { position:relative; font-family:'Montserrat'; }

  /* the light "drawer" that peeks out below the white card */
  .idx-drawer {
    position:relative; margin-top:-26px; padding:36px 22px 10px;
    border-radius:0 0 24px 24px; background:#EEF2F7;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), inset 0 -2px 0 rgba(15,23,42,0.03);
    display:flex; align-items:center; justify-content:center; gap:16px;
  }
  html.dark .idx-drawer { background:#131C2E; box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); }
  .idx-foot-txt { font-size:12px; font-weight:600; color:var(--slate-400,#94A3B8); letter-spacing:-0.01em; text-align:center; }
  .idx-foot-txt b { color:var(--slate-600,#475569); font-weight:800; }
  html.dark .idx-foot-txt { color:#64748B; } html.dark .idx-foot-txt b { color:#CBD5E1; }

  /* AI INSIGHTS pill */
  .idx-ai {
    flex-shrink:0; display:inline-flex; align-items:center; gap:8px; padding:5px 13px 5px 5px;
    border-radius:9999px; background:#FFFFFF; border:none; cursor:pointer; font-family:'Montserrat';
    box-shadow: 0 4px 14px rgba(15,23,42,0.10), inset 0 0 0 1px rgba(15,23,42,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
    transition: transform 160ms cubic-bezier(.34,1.56,.64,1), box-shadow 200ms;
  }
  html.dark .idx-ai { background:#1E293B; box-shadow: 0 4px 14px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.07); }
  .idx-ai:hover { transform:translateY(-1px); box-shadow: 0 8px 22px rgba(16,185,129,0.22), inset 0 0 0 1px rgba(16,185,129,0.3), inset 0 1px 0 rgba(255,255,255,0.9); }
  .idx-ai:active { transform:scale(0.97); }
  .idx-ai-orb {
    width:23px; height:23px; border-radius:9999px; flex-shrink:0; display:grid; place-items:center;
    font-size:9.5px; font-weight:900; color:#fff; letter-spacing:0.02em;
    background-color:#10B981;
    background-image: radial-gradient(ellipse at top right, rgba(255,255,255,0.25) 0%, transparent 55%),
      linear-gradient(rgba(255,255,255,0.16) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.16) 1px, transparent 1px);
    background-size: cover, 7px 7px, 7px 7px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -2px 0 rgba(0,0,0,0.2), 0 2px 8px rgba(16,185,129,0.45);
    text-shadow: 0 1px 1px rgba(0,0,0,0.2);
  }
  .idx-ai-label { font-size:11px; font-weight:800; letter-spacing:0.1em; color:var(--slate-600,#475569); }
  html.dark .idx-ai-label { color:#CBD5E1; }

  /* the white surface that floats on top */
  .idx-card {
    position:relative; z-index:2; box-sizing:border-box; border-radius:24px; overflow:hidden;
    background:var(--bg-card-solid,#fff); padding:24px 26px 26px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), inset 0 0 0 1px rgba(15,23,42,0.05),
      0 10px 30px -12px rgba(15,23,42,0.18), 0 2px 6px rgba(15,23,42,0.05);
  }
  html.dark .idx-card { background:#1E293B; box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), inset 0 0 0 1px rgba(255,255,255,0.05), 0 10px 30px -12px rgba(0,0,0,0.5); }

  /* ── metrics row ── */
  .idx-metrics { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); align-items:stretch; }
  .idx-m {
    position:relative; padding:6px 14px; border-radius:16px; cursor:default; min-width:0;
    display:flex; flex-direction:column; align-items:flex-start;
  }
  .idx-m:not(:first-child)::before {
    content:''; position:absolute; left:0; top:8px; bottom:8px; width:1px; background:var(--border-hairline,#E2E8F0);
  }
  html.dark .idx-m:not(:first-child)::before { background:rgba(255,255,255,0.08); }

  .idx-m-title { display:flex; align-items:flex-start; gap:6px; font-size:13px; font-weight:800; color:var(--fg1,#0F172A); letter-spacing:-0.015em; line-height:1.2; min-height:1.6em; }
  .idx-m-ico { font-size:1em; line-height:1.2; flex-shrink:0; color:var(--slate-400,#94A3B8); position:relative; top:0.02em; }
  html.dark .idx-m-ico { color:#64748B; }
  .idx-m-val { font-size:22px; font-weight:800; color:var(--slate-500,#64748B); letter-spacing:-0.02em; line-height:1; font-variant-numeric:tabular-nums; margin-top:4px; }
  html.dark .idx-m-val { color:#F1F5F9; }
  .idx-m .idx-badge { margin-top:8px; }

  .idx-spark { margin-top:14px; height:62px; width:100%;
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 8%, #000 92%, transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0%, #000 8%, #000 92%, transparent 100%); }
  .idx-spark svg { display:block; width:100%; height:100%; overflow:visible; }
  .idx-spark-line { fill:none; stroke-width:2.6; stroke-linecap:round; stroke-linejoin:round; transition: stroke-width 220ms, filter 220ms; }
  .idx-spark-line.up   { stroke:#10B981; filter: drop-shadow(0 1px 4px rgba(16,185,129,0.35)); }
  .idx-spark-line.down { stroke:#F26B6B; filter: drop-shadow(0 1px 4px rgba(239,68,68,0.30)); }

  /* ── pipeline index bar ── */
  .idx-funnel { margin-top:24px; }
  .idx-funnel-head { display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:18px; }
  .idx-funnel-title { font-size:16px; font-weight:800; color:var(--fg1,#0F172A); letter-spacing:-0.015em; }
  .idx-funnel-stage { font-size:13px; font-weight:700; color:var(--slate-400,#94A3B8); letter-spacing:-0.01em; }
  html.dark .idx-funnel-stage { color:#64748B; }
  .idx-funnel-stage b { color:#10B981; font-weight:800; }

  .idx-bars-wrap { position:relative; }
  .idx-bars { display:flex; align-items:center; gap:0; height:36px; }
  .idx-bar {
    flex:1 1 0; height:20px; min-width:0; margin:0 1.6px; border-radius:9999px;
    transform: scaleY(1); transform-origin:center;
    transition: transform 420ms cubic-bezier(.22,1,.36,1), height 300ms cubic-bezier(.22,1,.36,1), box-shadow 300ms;
  }
  .idx-bar.hidden { transform: scaleY(0); }
  .idx-bar.active {
    height:36px; z-index:2;
    box-shadow: 0 0 0 3px rgba(16,185,129,0.16), 0 4px 16px rgba(16,185,129,0.6);
    animation: idx-pulse 2.2s ease-in-out infinite;
  }
  @keyframes idx-pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(16,185,129,0.14), 0 3px 12px rgba(16,185,129,0.45); }
    50%     { box-shadow: 0 0 0 4px rgba(16,185,129,0.22), 0 5px 20px rgba(16,185,129,0.8); }
  }

  /* glowing sweep that runs across the bar once on load */
  .idx-sweep {
    position:absolute; inset:0; pointer-events:none; border-radius:12px; opacity:0;
    background: linear-gradient(90deg, transparent 0%, rgba(16,185,129,0.0) 35%, rgba(255,255,255,0.55) 50%, rgba(16,185,129,0.0) 65%, transparent 100%);
    -webkit-mask-image: linear-gradient(#000,#000); mix-blend-mode:overlay;
  }
  .idx-sweep.go { animation: idx-sweep 1100ms cubic-bezier(.4,0,.2,1) 250ms; }
  @keyframes idx-sweep { 0% { transform:translateX(-100%); opacity:0; } 20% { opacity:1; } 80% { opacity:1; } 100% { transform:translateX(100%); opacity:0; } }

  /* stage tick labels */
  .idx-ticks { display:flex; margin-top:12px; }
  .idx-tick { flex:1 1 0; text-align:center; font-size:9.5px; font-weight:800; letter-spacing:0.05em; text-transform:uppercase; color:var(--slate-400,#94A3B8); }
  .idx-tick.on { color:#10B981; }
  html.dark .idx-tick { color:#475569; } html.dark .idx-tick.on { color:#34D399; }

  /* replay */
  .replay { display:flex; justify-content:center; margin-top:16px; }
  .replay button {
    display:inline-flex; align-items:center; gap:6px; font-family:'Montserrat'; font-size:11px; font-weight:800; letter-spacing:0.02em;
    color:var(--fg3,#64748B); background:#fff; border:1px solid var(--border-hairline,#E2E8F0); padding:6px 12px; border-radius:9999px; cursor:pointer;
    box-shadow:0 2px 6px rgba(15,23,42,0.07), inset 0 1px 0 rgba(255,255,255,0.9); transition: transform 130ms cubic-bezier(.22,1,.36,1), color 150ms;
  }
  html.dark .replay button { background:#1E293B; border-color:rgba(255,255,255,0.1); color:#94A3B8; }
  .replay button:hover { transform:translateY(-1px); color:var(--fg1,#0F172A); }
  .replay button:active { transform:scale(0.95); }
  .replay button .material-symbols-outlined { font-size:14px; }

  @media (prefers-reduced-motion: reduce) {
    .idx-bar, .idx-sweep, .idx-bar.active { animation:none !important; transition:none !important; transform:scaleY(1) !important; opacity:1 !important; }
  }
</style>
<link rel="stylesheet" href="_darkmode.css">
</head>
<body>

<div class="card">
  <p class="sec">Pipeline Index Bar — dashboard overview</p>
  <p class="sec-sub">Three live pipeline metrics over a color-graded stage index. The bars draw in, numbers count up, and the current stage glows.</p>

  <div class="shell zoom">
    <div class="idx">
      <!-- WHITE SURFACE -->
      <div class="idx-card" data-comment-anchor="1c34a80d79-div">
        <div class="idx-metrics" id="metrics"></div>

        <div class="idx-funnel">
          <div class="idx-funnel-head" data-comment-anchor="ebdbcfe561-div">
            <span class="idx-funnel-title">Pipeline Stage Funnel</span>
            <span class="idx-funnel-stage">Current · <b>Moderate Priority</b></span>
          </div>
          <div class="idx-bars-wrap">
            <div class="idx-bars" id="bars" data-comment-anchor="954ca578f8-div"></div>
            <div class="idx-sweep" id="sweep"></div>
          </div>
          <div class="idx-ticks" id="ticks"></div>
        </div>
      </div>

      <!-- DRAWER FOOTER -->
      <div class="idx-drawer" data-comment-anchor="8150715f59-div">
        <span class="idx-foot-txt" data-comment-anchor="368120df17-span">Pipeline is <b>projected to increase</b>.</span>
      </div>
    </div>
  </div>

  <div class="replay"><button id="replay"><span class="material-symbols-outlined">replay</span>Replay</button></div>
</div>

<script>
(function(){
  const $ = (s,r)=>(r||document).querySelector(s);

  /* ── metric data (CRM) ──────────────────────────────────────────── */
  const METRICS = [
    { title:'Total Leads',      value:2847, fmt:'int',  delta:'0.50%',  dir:'up',   trend:'up',   icon:'groups'     },
    { title:'New Leads (MTD)',  value:318,  fmt:'int',  delta:'11.24%', dir:'down', trend:'down', icon:'person_add' },
    { title:'Conversion Rate',  value:24.6, fmt:'pct',  delta:'0.05%',  dir:'down', trend:'down', icon:'percent'    },
  ];

  /* honest, smooth series that ends trending in `dir` */
  function genSeries(n, dir){
    const a=[]; let v=50; const drift=dir==='up'?1.6:-1.4;
    for(let i=0;i<n;i++){ v += drift + (Math.random()-0.5)*8; a.push(v); }
    return a;
  }
  function buildSparkPath(data, W, H){
    const min=Math.min(...data), max=Math.max(...data), rng=(max-min)||1;
    const PAD=8;
    return data.map((v,i)=>{
      const x = (i/(data.length-1))*W;
      const y = PAD + (1-(v-min)/rng)*(H-PAD*2);
      return (i?'L':'M')+x.toFixed(1)+','+y.toFixed(1);
    }).join(' ');
  }
  const fmtVal = (m, n) => m.fmt==='pct' ? n.toFixed(1)+'%' : Math.round(n).toLocaleString('en-US');

  function buildMetrics(){
    const wrap = $('#metrics'); wrap.innerHTML='';
    METRICS.forEach(m=>{
      const el=document.createElement('div'); el.className='idx-m';
      el.innerHTML = `
        <div class="idx-m-title"><span class="material-symbols-outlined idx-m-ico">${m.icon}</span>${m.title}</div>
        <span class="idx-m-val" data-val>0</span>
        <span class="idx-badge ${m.dir}"><span class="material-icons">${m.dir==='up'?'trending_up':'trending_down'}</span>${m.dir==='up'?'+':'\u2212'}${m.delta}</span>
        <div class="idx-spark"><svg viewBox="0 0 180 62" preserveAspectRatio="none"><path class="idx-spark-line ${m.trend}"/></svg></div>`;
      wrap.appendChild(el);
      m._el = el;
    });
  }

  function tweenValue(m){
    const el = $('[data-val]', m._el); const to = m.value, t0 = performance.now(); let raf;
    function step(now){ let p=Math.min(1,(now-t0)/780); p=1-Math.pow(1-p,3);
      el.textContent = fmtVal(m, to*p); if(p<1) raf=requestAnimationFrame(step); }
    raf=requestAnimationFrame(step);
    setTimeout(()=>{ cancelAnimationFrame(raf); el.textContent = fmtVal(m, to); }, 840);
  }

  function drawSpark(m){
    m._series = genSeries(34, m.trend==='up'?'up':'down');
    const path = $('.idx-spark-line', m._el);
    path.setAttribute('d', buildSparkPath(m._series, 180, 62));
    const len = path.getTotalLength();
    path.style.transition='none'; path.style.strokeDasharray=len; path.style.strokeDashoffset=len;
    void path.getBoundingClientRect();
    setTimeout(()=>{ path.style.transition='stroke-dashoffset 900ms cubic-bezier(.33,1,.68,1)'; path.style.strokeDashoffset='0'; }, 60);
    setTimeout(()=>{ path.style.transition='none'; path.style.strokeDasharray='none'; path.style.strokeDashoffset='0'; }, 1050);
  }

  /* ── stage index bar ────────────────────────────────────────────── */
  const STAGES = [
    { name:'Prospect',    color:'#EF4444' },
    { name:'Qualification', color:'#F97316' },
    { name:'Onboarding',  color:'#EAB308' },
    { name:'Moderate',    color:'#84CC16' },
    { name:'Urgent',      color:'#10B981' },
  ];
  const N_BARS = 52;
  const ACTIVE = Math.round(N_BARS*0.70);   // sits in the "Moderate" (light-green) zone

  /* gradient stops red → orange → yellow → lime → emerald */
  const STOPS = [ [0,'#EF4444'],[0.28,'#F97316'],[0.5,'#EAB308'],[0.72,'#84CC16'],[1,'#10B981'] ];
  function hx(c){ return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)]; }
  function lerpColor(t){
    let a=STOPS[0], b=STOPS[STOPS.length-1];
    for(let i=0;i<STOPS.length-1;i++){ if(t>=STOPS[i][0] && t<=STOPS[i+1][0]){ a=STOPS[i]; b=STOPS[i+1]; break; } }
    const span=(b[0]-a[0])||1, k=(t-a[0])/span; const ca=hx(a[1]), cb=hx(b[1]);
    const r=Math.round(ca[0]+(cb[0]-ca[0])*k), g=Math.round(ca[1]+(cb[1]-ca[1])*k), bl=Math.round(ca[2]+(cb[2]-ca[2])*k);
    return `rgb(${r},${g},${bl})`;
  }

  function buildBars(){
    const bars = $('#bars'); bars.innerHTML='';
    for(let i=0;i<N_BARS;i++){
      const b=document.createElement('div'); b.className='idx-bar'+(i===ACTIVE?' active':'');
      b.style.background = i===ACTIVE ? '#10B981' : lerpColor(i/(N_BARS-1));
      if(i===ACTIVE){ b.style.backgroundImage='linear-gradient(rgba(255,255,255,0.18) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.18) 1px,transparent 1px)'; b.style.backgroundSize='7px 7px'; }
      bars.appendChild(b);
    }
    // ticks
    const ticks = $('#ticks'); ticks.innerHTML='';
    STAGES.forEach(s=>{
      const t=document.createElement('div'); t.className='idx-tick'+(s.name==='Moderate'?' on':'');
      t.textContent=s.name; ticks.appendChild(t);
    });
  }

  /* ── play sequence ──────────────────────────────────────────────────
     Resting state is fully visible. The entrance hides → reveals, then a
     finalize forces the visible end state so a throttled capture (where a
     transform transition can stay play-pending) never leaves a blank bar. */
  function play(){
    METRICS.forEach((m,i)=> setTimeout(()=>{ tweenValue(m); drawSpark(m); }, 120 + i*110));

    const bars=$('#bars').children;
    for(let i=0;i<bars.length;i++){ bars[i].style.transition='none'; bars[i].classList.add('hidden'); }
    void $('#bars').getBoundingClientRect();                       // commit hidden state
    for(let i=0;i<bars.length;i++){
      setTimeout(()=>{ bars[i].style.transition=''; bars[i].classList.remove('hidden'); }, 200 + i*11);
    }

    const sweep=$('#sweep'); sweep.classList.remove('go'); void sweep.offsetWidth; sweep.classList.add('go');

    const total = 200 + bars.length*11;
    // hard finalize — guarantee the visible resting state regardless of paint throttling
    setTimeout(()=>{
      for(let i=0;i<bars.length;i++){ bars[i].style.transition='none'; bars[i].classList.remove('hidden'); void bars[i].offsetWidth; bars[i].style.transition=''; }
    }, total + 600);
  }

  buildMetrics();
  buildBars();
  requestAnimationFrame(()=>{ play(); });

  $('#replay').addEventListener('click', play);
})();
</script>
<script src="_darkmode.js"></script>
</body></html>
