<!doctype html>
<!-- @dsCard group="Brand" name="Card primitives" subtitle="Glass, inner & accent surfaces" viewport="700x280" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { background: #F8FAFC; }
  .frame { padding: 24px; background-image: radial-gradient(ellipse at top right, rgba(16,185,129,0.10) 0%, rgba(248,250,252,1) 50%, #FFFFFF 100%); }
  .cards-grid { display:grid; gap: 14px; grid-template-columns: 1fr; }
  .card-inner {
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    border-radius: 20px; padding: 16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,1), inset 0 0 0 1px rgba(15,23,42,0.04);
    font-family:'Montserrat';
  }
  .card-accent {
    background: #10B981; color: #fff;
    border-radius: 24px; padding: 18px;
    box-shadow:
      0 10px 40px -10px rgba(16,185,129,0.5),
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -2px 0 rgba(0,0,0,0.22),
      inset 0 0 0 1px rgba(255,255,255,0.15);
    position: relative; overflow:hidden;
    font-family:'Montserrat';
    text-shadow: 0 1px 2px rgba(0,0,0,0.18);
    background-image:
      linear-gradient(to right,  rgba(255,255,255,0.07) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .card-accent::before {
    content:''; position:absolute; inset: 0;
    background: radial-gradient(ellipse at top right, rgba(255,255,255,0.18) 0%, transparent 55%);
    pointer-events: none;
  }
  .name { font-weight:800; font-size:14px; }
  .desc { font-size:12px; color:#64748B; line-height:1.45; margin-top:4px; }
  .desc-w { color: rgba(255,255,255,0.85); }
  .tag { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 9px; color: #94A3B8; margin-top: 8px; display:block; }
  .tag-w { color: rgba(255,255,255,0.7); }

  /* ── Theme toggle ── */
  #themeToggle{position:fixed;top:14px;right:14px;z-index:1000;display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 13px;border-radius:9999px;border:1px solid rgba(15,23,42,.14);background:rgba(255,255,255,.9);color:#0F172A;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;letter-spacing:.02em;cursor:pointer;box-shadow:0 4px 14px -6px rgba(15,23,42,.25);}
  [data-theme="dark"] #themeToggle{border-color:rgba(255,255,255,.16);background:rgba(30,41,59,.92);color:#F1F5F9;}

  /* ── Dark mode ── */
  [data-theme="dark"] .card{ background:#0B1220 !important; }
  [data-theme="dark"] .frame{ background-image:radial-gradient(ellipse at top right, rgba(16,185,129,0.08) 0%, #0B1220 55%) !important; }
  [data-theme="dark"] .card-inner{ background:#1E293B; border-color:#334155; box-shadow:inset 0 1px 0 rgba(255,255,255,.05), inset 0 0 0 1px rgba(255,255,255,.04); }
  [data-theme="dark"] .name{ color:#F1F5F9; }
  [data-theme="dark"] .desc{ color:#94A3B8; }
  [data-theme="dark"] .tag{ color:#64748B; }
  /* Accent (emerald) card keeps white text in dark mode */
  [data-theme="dark"] .card-accent .name { color:#fff; }
  [data-theme="dark"] .card-accent .desc-w { color: rgba(255,255,255,0.9); }
  [data-theme="dark"] .card-accent .tag-w { color: rgba(255,255,255,0.72); }
</style>
</head><body><div class="card" style="padding:0; background:#F8FAFC;">
  <div class="frame" data-comment-anchor="26984f823f-div">
    <div class="cards-grid">
    <div class="shell zoom"><div class="card-inner">
      <div class="name">Inner Card</div>
      <div class="desc">white · slate-200 border · 20px radius · clean inset</div>
      <span class="tag">.card-inner · nested surface</span>
    </div></div>
    <div class="card-accent" data-comment-anchor="70ba0c39c4-div">
      <div class="name" style="position:relative; z-index:1;">Accent Card</div>
      <div class="desc desc-w" style="position:relative; z-index:1;">Emerald fill · sheen overlay · 24px radius · emerald-glow shadow.</div>
      <span class="tag tag-w" style="position:relative; z-index:1;">.card-accent · hero / goal / simulator</span>
    </div>
    </div>
  </div>
</div>
<button id="themeToggle" aria-label="Toggle dark mode"><span aria-hidden="true">◐</span><span class="tg-label">Dark</span></button>
<script>(function(){var K='deha-theme';var R=document.documentElement;function apply(d){var st=document.createElement('style');st.textContent='*,*::before,*::after{transition:none!important;animation:none!important}';document.head.appendChild(st);if(d)R.setAttribute('data-theme','dark');else R.removeAttribute('data-theme');void R.offsetWidth;requestAnimationFrame(function(){requestAnimationFrame(function(){st.remove();});});}if(localStorage.getItem(K)==='dark')R.setAttribute('data-theme','dark');var b=document.getElementById('themeToggle');function s(){var d=R.getAttribute('data-theme')==='dark';b.querySelector('.tg-label').textContent=d?'Light':'Dark';}s();b.addEventListener('click',function(){var d=R.getAttribute('data-theme')==='dark';apply(!d);localStorage.setItem(K,d?'light':'dark');s();});})();</script>
</body></html>
