<!doctype html>
<!-- @dsCard group="Brand" name="Buttons" subtitle="Primary, inverse, glass, text" viewport="700x140" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  .row { display:flex; gap: 12px; align-items:center; flex-wrap: wrap; }
  .row + .row { margin-top: 14px; }
  .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #94A3B8; display:block; margin-bottom: 6px; }

  .btn-primary {
    display:inline-flex; align-items:center; gap: 8px;
    padding: 12px 20px;
    background: #10B981; color: #fff;
    border: none; border-radius: 14px;
    font-family: 'Montserrat'; font-size: 14px; font-weight: 800;
    text-shadow: 0 1px 2px rgba(0,0,0,0.18);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -2px 0 rgba(0,0,0,0.22),
      inset 0 0 0 1px rgba(255,255,255,0.15);
    background-image:
      linear-gradient(to right,  rgba(255,255,255,0.07) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 14px 14px;
    cursor: pointer;
  }
  .btn-inverse {
    display:inline-flex; align-items:center; gap: 8px;
    padding: 12px 20px;
    background: #fff; color: #10B981;
    border: none; border-radius: 14px;
    font-family: 'Montserrat'; font-size: 14px; font-weight: 800;
    box-shadow:
      inset 0 0 0 1px rgba(15,23,42,0.22),
      inset 0 1px 0 rgba(255,255,255,0.7),
      inset 0 -2px 0 rgba(15,23,42,0.14);
    cursor: pointer;
  }
  .btn-glass {
    display:inline-flex; align-items:center; gap: 8px;
    padding: 10px 18px;
    background: rgba(255,255,255,0.8);
    color: #334155;
    border: none;
    border-radius: 14px;
    font-family: 'Montserrat'; font-size: 14px; font-weight: 700;
    box-shadow:
      inset 0 0 0 1px rgba(15,23,42,0.22),
      inset 0 1px 0 rgba(255,255,255,0.6),
      inset 0 -2px 0 rgba(15,23,42,0.12);
    backdrop-filter: blur(20px);
    cursor: pointer;
  }
  .btn-text {
    background: none; border: none;
    color: #10B981;
    font-family: 'Montserrat'; font-size: 14px; font-weight: 800;
    display:inline-flex; align-items:center; gap: 4px;
    padding: 6px 0;
    cursor: pointer;
  }
  .material-icons { font-size: 18px; }

  /* ── Theme toggle ── */
  #themeToggle{position:fixed;top:14px;right:14px;z-index:1000;display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 13px;border-radius:9999px;border:1px solid rgba(15,23,42,.14);background:rgba(255,255,255,.9);color:#0F172A;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;letter-spacing:.02em;cursor:pointer;box-shadow:0 4px 14px -6px rgba(15,23,42,.25);}
  [data-theme="dark"] #themeToggle{border-color:rgba(255,255,255,.16);background:rgba(30,41,59,.92);color:#F1F5F9;}

  /* ── Dark mode ── */
  [data-theme="dark"] .card{ background:#0B1220 !important; background-image:radial-gradient(ellipse at top right, rgba(16,185,129,0.08) 0%, #0B1220 55%) !important; }
  [data-theme="dark"] .label{ color:#94A3B8; }
  [data-theme="dark"] .btn-inverse{ background:#1E293B; color:#34D399; box-shadow:inset 0 0 0 1px rgba(255,255,255,.22), inset 0 1px 0 rgba(255,255,255,.08), inset 0 -2px 0 rgba(0,0,0,.3); }
  [data-theme="dark"] .btn-glass{ background:rgba(30,41,59,.7); color:#CBD5E1; box-shadow:inset 0 0 0 1px rgba(255,255,255,.22), inset 0 1px 0 rgba(255,255,255,.08), inset 0 -2px 0 rgba(0,0,0,.3); }
</style>
</head><body><div class="card">
  <span class="label">Buttons</span>
  <div class="row">
    <button class="btn-primary">View Your Leads <span class="material-icons">arrow_forward</span></button>
    <button class="btn-inverse" data-comment-anchor="194aa315ef-button">View Your Leads <span class="material-icons">arrow_forward</span></button>
    <button class="btn-glass">Son 30 Gün <span class="material-icons">expand_more</span></button>
    <button class="btn-text">Tüm Görevleri Gör <span class="material-icons">arrow_forward</span></button>
  </div>
</div>
<button id="themeToggle" aria-label="Toggle dark mode"><span aria-hidden="true">◐</span><span class="tg-label">Dark</span></button>
<script>(function(){var K='deha-theme';var R=document.documentElement;function apply(d){var st=document.createElement('style');st.textContent='*,*::before,*::after{transition:none!important;animation:none!important}';document.head.appendChild(st);if(d)R.setAttribute('data-theme','dark');else R.removeAttribute('data-theme');void R.offsetWidth;requestAnimationFrame(function(){requestAnimationFrame(function(){st.remove();});});}if(localStorage.getItem(K)==='dark')R.setAttribute('data-theme','dark');var b=document.getElementById('themeToggle');function s(){var d=R.getAttribute('data-theme')==='dark';b.querySelector('.tg-label').textContent=d?'Light':'Dark';}s();b.addEventListener('click',function(){var d=R.getAttribute('data-theme')==='dark';apply(!d);localStorage.setItem(K,d?'light':'dark');s();});})();</script>
</body></html>
