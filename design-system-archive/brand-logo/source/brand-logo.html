<!doctype html>
<!-- @dsCard group="Brand" name="Logo & wordmark" subtitle="Placeholder mark + lockup (real logo pending)" viewport="700x200" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .wm { display:flex; align-items:center; gap:14px; padding: 20px 24px; }
  .wm-mark { width: 56px; height: 56px; border-radius: 16px; background: #10B981; display:grid; place-items:center; box-shadow: 0 10px 30px -10px rgba(16,185,129,0.5); }
  .wm-mark svg { display:block; }
  .wm-text { font-weight: 900; font-size: 44px; letter-spacing: -0.03em; color: #0F172A; line-height: 1; }
  .wm-tag { font-weight: 600; font-size: 12px; color: #64748B; margin-top: 6px; letter-spacing: 0.02em; }
  .variants { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 0 24px 24px; }
  .variant { border-radius: 16px; padding: 18px; display:flex; align-items:center; justify-content:center; gap:10px; }
  .variant.on-white { background: #FFFFFF; border: 1px solid #E2E8F0; }
  .variant.on-emerald { background: #10B981; }
  .variant.on-dark { background: #0F172A; }
  .v-text { font-weight: 900; font-size: 24px; letter-spacing: -0.03em; }
  .v-text.dark { color: #0F172A; }
  .v-text.white { color: #FFFFFF; }
  .v-mark { width: 32px; height: 32px; border-radius: 10px; display:grid; place-items:center; }
  .v-mark.emerald { background: #10B981; }
  .v-mark.white   { background: #FFFFFF; }
  .star { width: 18px; height: 18px; }
</style>
</head><body><div class="card" style="padding:0">
  <div class="wm">
    <div class="wm-mark">
      <svg width="32" height="32" viewBox="0 0 32 32"><path d="M16 4 L19 13 L28 16 L19 19 L16 28 L13 19 L4 16 L13 13 Z" fill="#fff"/><circle cx="25" cy="7" r="1.6" fill="#fff"/><circle cx="7" cy="25" r="1.2" fill="#fff" opacity="0.85"/></svg>
    </div>
    <div>
      <div class="wm-text">Deha</div>
      <div class="wm-tag">Smartest CRM</div>
    </div>
  </div>
  <div class="variants">
    <div class="variant on-white">
      <div class="v-mark emerald"><svg class="star" viewBox="0 0 32 32"><path d="M16 4 L19 13 L28 16 L19 19 L16 28 L13 19 L4 16 L13 13 Z" fill="#fff"/></svg></div>
      <div class="v-text dark">Deha</div>
    </div>
    <div class="variant on-emerald">
      <div class="v-mark white"><svg class="star" viewBox="0 0 32 32"><path d="M16 4 L19 13 L28 16 L19 19 L16 28 L13 19 L4 16 L13 13 Z" fill="#10B981"/></svg></div>
      <div class="v-text white">Deha</div>
    </div>
    <div class="variant on-dark">
      <div class="v-mark emerald"><svg class="star" viewBox="0 0 32 32"><path d="M16 4 L19 13 L28 16 L19 19 L16 28 L13 19 L4 16 L13 13 Z" fill="#fff"/></svg></div>
      <div class="v-text white">Deha</div>
    </div>
  </div>
</div></body></html>
