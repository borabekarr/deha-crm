<!doctype html>
<!-- @dsCard group="Brand" name="Hero accent card" subtitle="Emerald CTA — sparkle, copy, button" viewport="700x280" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  body { background: #F8FAFC; }
  .frame { padding: 24px; background-image: radial-gradient(ellipse at top right, rgba(16,185,129,0.18) 0%, rgba(248,250,252,1) 60%, #FFFFFF 100%); }
  .hero {
    background: #10B981;
    border-radius: 24px;
    padding: 22px;
    color: #fff;
    box-shadow:
      0 10px 40px -10px rgba(16,185,129,0.5),
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -2px 0 rgba(0,0,0,0.22),
      inset 0 0 0 1px rgba(255,255,255,0.15);
    position: relative;
    overflow: hidden;
    font-family: 'Montserrat';
    text-shadow: 0 1px 2px rgba(0,0,0,0.18);
    background-image:
      linear-gradient(to right,  rgba(255,255,255,0.07) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .hero::before {
    content:''; position:absolute; inset: 0;
    background: radial-gradient(ellipse at top right, rgba(255,255,255,0.18) 0%, transparent 55%);
    pointer-events: none;
  }
  .h-icon {
    position: relative; z-index: 1;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    display:grid; place-items:center;
    backdrop-filter: blur(12px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .h-icon .material-icons { font-size: 24px; color: #fff; }
  .h-title { position: relative; z-index: 1; font-size: 20px; font-weight: 800; margin: 16px 0 8px; letter-spacing: -0.01em; }
  .h-sub   { position: relative; z-index: 1; font-size: 14px; font-weight: 600; line-height: 1.55; color: rgba(255,255,255,0.95); max-width: 80%; }
  .h-btn   { position: relative; z-index: 1; display:inline-flex; align-items:center; gap: 8px; margin-top: 18px; padding: 12px 20px; background: #fff; color: #10B981; border-radius: 14px; font-weight: 800; font-size: 14px; box-shadow: inset 0 1px 0 rgba(255,255,255,1), inset 0 -2px 0 rgba(15,23,42,0.12), inset 0 0 0 1px rgba(15,23,42,0.07); border:none; cursor:pointer; font-family:'Montserrat'; }
  .h-btn .material-icons { font-size: 18px; }
</style>
</head><body><div class="card" style="padding:0; background:#F8FAFC;">
  <div class="frame">
    <div class="hero">
      <div class="h-icon"><span class="material-icons">auto_awesome</span></div>
      <div class="h-title">Welcome to Deha CRM!</div>
      <div class="h-sub">Your dashboard is already analyzing leads. Check out your AI-matched properties and conversion pipeline.</div>
      <button class="h-btn">View Your Leads <span class="material-icons">arrow_forward</span></button>
    </div>
  </div>
</div></body></html>
