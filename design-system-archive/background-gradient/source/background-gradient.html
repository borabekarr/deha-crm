<!doctype html>
<!-- @dsCard group="Brand" name="Page gradient" subtitle="Flat white default · grid-on-white for highlighted sections" viewport="700x240" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { background: #FFFFFF; }
  .holder { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 18px; background: #FFFFFF; }
  .stage {
    height: 200px; border-radius: 16px;
    position: relative; overflow: hidden;
    border: 1px solid #E2E8F0;
  }
  .stage.flat { background: #FFFFFF; }
  .stage.grid {
    background: #FFFFFF;
    background-image:
      linear-gradient(to right, rgba(15,23,42,0.035) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(15,23,42,0.035) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .pill {
    position: absolute; top: 16px; left: 16px;
    padding: 5px 11px; border-radius: 9999px;
    background: #0F172A; color: #fff;
    font-size: 10px; font-weight: 800; letter-spacing: 0.05em;
    font-family: 'Montserrat';
  }
  .meta {
    position: absolute; left: 16px; bottom: 14px; right: 16px;
    font-family: 'Montserrat';
  }
  .meta .name { font-weight: 800; font-size: 13px; color: #0F172A; letter-spacing: -0.01em; }
  .meta .desc { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10px; color: #64748B; margin-top: 3px; line-height: 1.4; }
</style>
</head><body>
<div class="card" style="padding:0">
  <div class="holder">
    <div class="stage flat">
      <span class="pill">DEFAULT</span>
      <div class="meta">
        <div class="name">Flat white</div>
        <div class="desc">#FFFFFF · used everywhere by default</div>
      </div>
    </div>
    <div class="stage grid">
      <span class="pill" style="background:#10B981">SECTION</span>
      <div class="meta">
        <div class="name">Grid on white</div>
        <div class="desc">24px grid · rgba(15,23,42,0.035)<br>Reserved for highlighted sections</div>
      </div>
    </div>
  </div>
</div>
</body></html>
