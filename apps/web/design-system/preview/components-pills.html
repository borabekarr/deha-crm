<!doctype html>
<!-- @dsCard group="Brand" name="Pills, chips & badges" subtitle="Priority dots, segmented, stat badges" viewport="700x230" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  .row { display:flex; align-items:center; gap: 8px; flex-wrap: wrap; }
  .row + .row { margin-top: 12px; }

  .pill-priority { display:inline-flex; align-items:center; gap: 6px; padding: 6px 14px; border-radius: 9999px; background: #FFFFFF; border: 1px solid #CBD5E1; font-size: 13px; font-weight: 600; color: #64748B; font-family:'Montserrat'; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.07), inset 0 -1px 2px rgba(0,0,0,0.04); }
  .pill-priority .dot { width: 8px; height: 8px; border-radius: 50%; }

  .pill-tab { display:inline-flex; align-items:center; padding: 6px 16px; border-radius: 9999px; background: #FFFFFF; border: 1px solid #CBD5E1; font-size: 12px; font-weight: 600; color: #64748B; font-family:'Montserrat'; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.07), inset 0 -1px 2px rgba(0,0,0,0.04); }
  .pill-tab.active { background: #10B981; color:#fff; border-color: transparent; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.15), inset 0 -1px 0 rgba(255,255,255,0.15); font-weight: 800; }
  .pill-tab.dark { background:#0F172A; color:#fff; font-weight: 800; border-color: transparent; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.35), inset 0 -1px 0 rgba(255,255,255,0.06); }

  .badge { display:inline-flex; align-items:center; gap: 3px; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 800; font-family:'Montserrat'; }
  .badge.success { background: #10B981; color:#fff; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.14), inset 0 -1px 0 rgba(255,255,255,0.15); }
  .badge.success .material-icons { font-size: 14px; }
  .badge.gci { background:#10B981; color:#fff; border:none; padding: 6px 12px; text-shadow: 0 1px 2px rgba(0,0,0,0.28); box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -2px 0 rgba(15,23,42,0.18), inset 0 0 0 1px rgba(15,23,42,0.10); background-image: linear-gradient(rgba(255,255,255,0.13) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.13) 1px, transparent 1px); background-size: 7px 7px; }
  .badge.time { background:#EF4444; color:#fff; padding: 4px 10px; border:none; text-shadow: 0 1px 2px rgba(0,0,0,0.28); box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -2px 0 rgba(15,23,42,0.18), inset 0 0 0 1px rgba(15,23,42,0.10); background-image: linear-gradient(rgba(255,255,255,0.13) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.13) 1px, transparent 1px); background-size: 7px 7px; }
  .badge.time .material-icons { font-size: 12px; }
  .badge.danger { background:#EF4444; color:#fff; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.14), inset 0 -1px 0 rgba(255,255,255,0.15); }
  .badge.danger .material-icons { font-size: 11px; }
  .badge.tag { background:#F1F5F9; color:#475569; padding: 6px 12px; border:1px solid #CBD5E1; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.07), inset 0 -1px 0 rgba(255,255,255,0.8); }
  .badge.tag .material-icons { font-size: 13px; color: #94A3B8; }

  /* Task board column tags — solid semantic color + inset highlight/shadow, with embedded white count pill */
  .badge.col-tag { display:inline-flex; align-items:center; gap: 6px; padding: 5px 5px 5px 9px; border-radius: 9999px; font-family:'Montserrat'; font-size: 11px; font-weight: 800; color:#fff; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1; text-shadow: 0 1px 2px rgba(0,0,0,0.35), 0 1px 0 rgba(0,0,0,0.22); box-shadow: inset 0 1px 0 rgba(255,255,255,0.30), inset 0 -1.5px 0 rgba(0,0,0,0.18), inset 0 0 0 1px rgba(0,0,0,0.06); }
  .badge.col-tag .material-icons { font-size: 14px; text-shadow: 0 1px 2px rgba(0,0,0,0.40), 0 1px 0 rgba(0,0,0,0.22); }
  .badge.col-tag .count { display:inline-grid; place-items:center; min-width: 18px; height: 18px; padding: 0 6px; border-radius: 9999px; background: rgba(255,255,255,0.94); color: rgba(15,23,42,0.85); font-size: 10.5px; font-weight: 900; letter-spacing: 0; text-shadow: none; box-shadow: inset 0 -1px 0 rgba(0,0,0,0.08), inset 0 0 0 1px rgba(0,0,0,0.05); font-variant-numeric: tabular-nums; }
  .badge.col-tag.todo     { background:#64748B; }
  .badge.col-tag.progress { background:#F97316; }
  .badge.col-tag.review   { background:#FACC15; color:#451A03; text-shadow: none; }
  .badge.col-tag.review .material-icons { text-shadow: none; }
  .badge.col-tag.done     { background:#10B981; }

  .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #94A3B8; margin-bottom: 8px; display:block; }
</style>
<link rel="stylesheet" href="_controls.css">
<link rel="stylesheet" href="_darkmode.css">
</head><body><div class="card">
  <span class="label">Priority filter</span>
  <div class="row">
    <span class="pill-priority"><span class="dot" style="background:#EF4444"></span> Yüksek</span>
    <span class="pill-priority"><span class="dot" style="background:#EAB308"></span> Orta</span>
    <span class="pill-priority"><span class="dot" style="background:#10B981"></span> Düşük</span>
    <span class="pill-tab dark">Tümü</span>
  </div>

  <span class="label" style="margin-top: 16px">Segmented</span>
  <div class="row">
    <div class="seg accent" data-comment-anchor="f3485e84e4-span"><span class="seg-pill"></span><button class="active">Daily</button><button>Weekly</button><button>Monthly</button></div>
  </div>

  <span class="label" style="margin-top: 16px">Stat badges</span>
  <div class="row">
    <span class="badge success"><span class="material-icons">trending_up</span> +12%</span>
    <span class="badge danger"><span class="material-icons">trending_down</span> -34%</span>
    <span class="badge gci"><span>$</span> 45K GCI</span>
    <span class="badge time"><span class="material-icons">schedule</span> 12:00</span>
    <span class="badge tag"><span class="material-icons">home_work</span> Değerleme</span>
    <span class="badge tag"><span class="material-icons">sell</span> Satış</span>
    <span class="badge tag"><span class="material-icons">volunteer_activism</span> Nurture</span>
  </div>
  <span class="label" style="margin-top: 16px">Task board column tags</span>
  <div class="row">
    <span class="badge col-tag todo"><span class="material-icons">inbox</span> Todo <span class="count">4</span></span>
    <span class="badge col-tag progress"><span class="material-icons">bolt</span> In Progress <span class="count">3</span></span>
    <span class="badge col-tag review"><span class="material-icons">visibility</span> Review <span class="count">2</span></span>
    <span class="badge col-tag done"><span class="material-icons">task_alt</span> Done <span class="count">3</span></span>
  </div>
</div>
<script src="_controls.js"></script>
<script src="_darkmode.js"></script>
</body></html>
