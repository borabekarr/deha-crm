<style>
  body { background:#F8FAFC; }
  .card { display:flex; flex-direction:column; align-items:center; gap:6px; position:relative; }

  .material-symbols-outlined {
    font-family:'Material Symbols Outlined'; font-weight:normal; font-style:normal; line-height:1;
    letter-spacing:normal; text-transform:none; display:inline-block; white-space:nowrap; word-wrap:normal;
    direction:ltr; -webkit-font-feature-settings:'liga'; font-feature-settings:'liga'; -webkit-font-smoothing:antialiased;
  }

  .ff-stage { display:flex; gap:26px; justify-content:center; align-items:flex-start; padding:16px 0 6px; }
  .ff-col   { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .ff-cap   { display:inline-flex; align-items:center; gap:7px; font-size:10.5px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--fg4); }
  .ff-cap .dot { width:7px; height:7px; border-radius:50%; }
  .ff-cap .dot.blue { background:#3B82F6; }
  .ff-cap .dot.red  { background:#FF3B30; box-shadow:0 0 8px rgba(255,59,48,0.7); }

  .ff-hint   { font-family: ui-monospace,"SF Mono",Menlo,monospace; font-size:10.5px; color:var(--fg4); margin-top:4px; }
  .ff-replay {
    margin-top:2px; display:inline-flex; align-items:center; gap:6px;
    font-family:'Montserrat'; font-size:11px; font-weight:800; letter-spacing:0.02em;
    color:var(--fg3); background:#fff; border:1px solid var(--border-hairline);
    padding:6px 12px; border-radius:9999px; cursor:pointer;
    box-shadow:0 2px 6px rgba(15,23,42,0.07), inset 0 1px 0 rgba(255,255,255,0.9);
    transition:transform 130ms cubic-bezier(.22,1,.36,1), color 150ms;
  }
  .ff-replay:hover { transform:translateY(-1px); color:var(--fg1); }
  .ff-replay:active { transform:scale(0.95); }
  .ff-replay .material-symbols-outlined { font-size:14px; }

  /* ════════════════════ THE ICON ════════════════════ */
  .folder {
    --size: 268px;
    --rad: 32px;
    --frame: 9px;          /* black bezel thickness around the gradient */
    --fy: 0px;             /* lift  */
    --fsc: 1;              /* scale */
    --glow: rgba(59,130,246,0.50);

    /* light theme tokens (default = light mode) */
    --ff-body: #FFFFFF;
    --ff-border: rgba(15,23,42,0.10);
    --ff-pocket: #FFFFFF;
    --ff-pocket-edge: rgba(15,23,42,0.13);
    --ff-pocket-shadow: rgba(15,23,42,0.18);
    --ff-title: #0F172A;
    --ff-title-glow: rgba(15,23,42,0);
    --ff-sub: #64748B;
    --ff-meta: #475569;
    --ff-paper: #FFFFFF;
    --ff-line: #DCE3EC;
    --ff-paper-shadow: 0 10px 22px rgba(15,23,42,0.20), 0 1px 0 rgba(15,23,42,0.05);
    --ff-shadow: 0 22px 46px -14px rgba(15,23,42,0.32), 0 5px 14px rgba(15,23,42,0.12);
    --ff-gloss: rgba(255,255,255,0.5);
    --ff-rim: rgba(15,23,42,0.10);
    /* inner background panel that the labels sit on */
    --ff-panel: linear-gradient(180deg, #FFFFFF 0%, #EFF3F9 100%);
    --ff-panel-bd: rgba(15,23,42,0.07);
    --ff-panel-hi: rgba(255,255,255,0.95);
    --ff-panel-sh: rgba(15,23,42,0.07);

    position: relative;
    width: var(--size); height: var(--size);
    border-radius: var(--rad);
    background: var(--ff-body);
    box-shadow: var(--ff-shadow), inset 0 0 0 1px var(--ff-rim), inset 0 1.5px 0 var(--ff-gloss);
    transform: translateY(var(--fy)) scale(var(--fsc));
    transform-origin: center 62%;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 600ms cubic-bezier(.34,1.5,.64,1), box-shadow 380ms ease, opacity 480ms ease;
  }
  .folder * { box-sizing: border-box; }

  /* clip layer so gradient / papers / pocket respect the squircle */
  .ff-clip { position:absolute; inset:0; border-radius:inherit; overflow:hidden; }

  /* gradient top — INSET inside the body so a thin bezel frames it ----- */
  .ff-grad {
    position:absolute; top:var(--frame); left:var(--frame); right:var(--frame);
    height:58%;
    border-radius: 22px 22px 0 0;
    transition: opacity 600ms ease;
    background: radial-gradient(125% 125% at 22% 2%, #9AC8F6 0%, #5594F1 34%, #2C66E0 68%, #2150CB 100%);
  }
  .ff-grad::before {     /* faint house-style grid texture */
    content:''; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 13px 13px;
    -webkit-mask-image: linear-gradient(to bottom,#000 0%,#000 40%,transparent 66%);
            mask-image: linear-gradient(to bottom,#000 0%,#000 40%,transparent 66%);
  }
  .ff-grad::after {      /* pulsing red hotspot — used by the hot variant */
    content:''; position:absolute; inset:0; pointer-events:none; opacity:0; border-radius:inherit;
    background: radial-gradient(70% 60% at 50% 6%, rgba(255,96,86,0.55) 0%, transparent 60%);
  }
  .folder.hot .ff-grad {
    background: radial-gradient(130% 120% at 30% 10%, #FF2A2A 0%, #FF5247 30%, #FB6A82 62%, #EE89B4 100%);
  }

  /* paper sheets ------------------------------------------------ */
  .ff-papers { position:absolute; inset:0; }
  .ff-paper {
    --rot:0deg; --tx:0px; --ty:0px; --sc:1;
    position:absolute;
    background: var(--ff-paper);
    border-radius: 12px;
    box-shadow: var(--ff-paper-shadow);
    transform: translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(var(--sc));
    transition: transform 560ms cubic-bezier(.34,1.56,.64,1), opacity 440ms ease;
    padding: 18px 16px;
  }
  .ff-paper .line { height:3px; border-radius:2px; background:var(--ff-line); margin-bottom:9px; }
  .ff-paper .line.w1 { width:72%; }
  .ff-paper .line.w2 { width:90%; }
  .ff-paper .line.w3 { width:58%; }
  .ff-paper .line.w4 { width:82%; }

  .ff-paper--back  { left:34px;  top:54px;  width:126px; height:122px; --rot:-10deg; z-index:1; }
  .ff-paper--mid   { left:68px;  top:38px;  width:134px; height:128px; --rot:-3deg;  z-index:3; }
  .ff-paper--front { left:110px; top:52px;  width:126px; height:122px; --rot:13deg;  z-index:2; }

  /* folder front pocket (SVG path: raised left tab → ogee notch → lower shelf) */
  .ff-pocket {
    position:absolute; inset:0; z-index:4; pointer-events:none;
    filter: drop-shadow(0 -3px 6px var(--ff-pocket-shadow)) drop-shadow(0 -1px 0 var(--ff-pocket-edge));
  }
  .ff-pocket path { fill: var(--ff-pocket); }

  /* labels ------------------------------------------------------ */
  .ff-text { position:absolute; inset:0; z-index:5; }
  .ff-text > * { user-select:text; }
  .ff-title {
    position:absolute; left:26px; top:114px;
    font-size:19px; font-weight:800; letter-spacing:-0.01em; color:var(--ff-title);
    transform-origin:left center;
    transition: transform 260ms cubic-bezier(.22,1,.36,1), text-shadow 260ms ease;
  }
  .ff-sub {
    position:absolute; left:26px; top:139px;
    font-size:13px; font-weight:600; color:var(--ff-sub);
  }
  .ff-dots {
    position:absolute; right:24px; top:140px;
    color:var(--ff-sub); display:flex; gap:4px;
  }
  .ff-dots i { width:5px; height:5px; border-radius:50%; background:currentColor; display:block; }
  .ff-count {
    position:absolute; left:26px; bottom:22px;
    display:flex; align-items:center; gap:7px; white-space:nowrap;
    font-size:12px; font-weight:600; color:var(--ff-meta);
  }
  .ff-count .material-symbols-outlined { font-size:15px; color:var(--ff-meta); }

  /* ════════════════════ HOVER (lift only — no shadow glow) ════════════════════ */
  .folder:hover { --fy:-5px; }
  .folder:hover .ff-paper { --ty:-5px; }
  .folder:hover .ff-paper--mid   { --ty:-7px; }
  .folder:hover .ff-paper--front { --ty:-4px; }
  .folder:hover .ff-title { transform:scale(1.04); }

  /* ════════════════════ TAP — micro spring + ripple ════════════════════ */
  .folder.tap { --fsc:0.97; }
  .folder.tap .ff-paper        { --ty:-11px; }
  .folder.tap .ff-paper--back  { --tx:-10px; --ty:-8px; }
  .folder.tap .ff-paper--front { --tx:12px;  --ty:-8px; }
  .folder.tap .ff-paper--mid   { --ty:-14px; }

  /* ════════════════════ ENTRANCE — visible base, gated on .play ════════════════════ */
  @media (prefers-reduced-motion: no-preference) {
    .folder.play           { animation: ffIn 620ms cubic-bezier(.34,1.5,.64,1) backwards; }
    .folder.play .ff-grad  { animation: ffFade 640ms ease backwards; }
    .folder.play .ff-paper { animation: ffPaperIn 560ms cubic-bezier(.34,1.56,.64,1) backwards; }
    .folder.play .ff-paper--back  { animation-delay: 150ms; }
    .folder.play .ff-paper--front { animation-delay: 240ms; }
    .folder.play .ff-paper--mid   { animation-delay: 330ms; }
    .folder.play .ff-title { animation: ffRise 500ms ease 420ms backwards; }
    .folder.play .ff-sub   { animation: ffRise 500ms ease 470ms backwards; }
    .folder.play .ff-dots  { animation: ffRise 500ms ease 510ms backwards; }
    .folder.play .ff-count { animation: ffRise 500ms ease 540ms backwards; }

    .folder.hot      { animation: ffHotGlow 2.6s ease-in-out infinite; }
    .folder.hot.play { animation: ffIn 620ms cubic-bezier(.34,1.5,.64,1) backwards,
                                  ffHotGlow 2.6s ease-in-out 1100ms infinite; }
    .folder.hot .ff-grad::after { animation: ffHotSpot 2.6s ease-in-out infinite; }
  }

  @keyframes ffIn {
    0%   { opacity:0; transform: translateY(var(--fy)) scale(0.86); }
    100% { opacity:1; transform: translateY(var(--fy)) scale(var(--fsc)); }
  }
  @keyframes ffFade { 0% { opacity:0; } 100% { opacity:1; } }
  @keyframes ffPaperIn {
    0%   { opacity:0; transform: translate(var(--tx), calc(var(--ty) + 26px)) rotate(var(--rot)) scale(0.9); }
    100% { opacity:1; transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(var(--sc)); }
  }
  @keyframes ffRise { 0% { opacity:0; transform: translateY(10px); } 100% { opacity:1; transform: translateY(0); } }
  @keyframes ffHotGlow {
    0%,100% { box-shadow: var(--ff-shadow), inset 0 0 0 1px var(--ff-rim), inset 0 0 34px -6px rgba(255,59,48,0.34); }
    50%     { box-shadow: var(--ff-shadow), inset 0 0 0 1px var(--ff-rim), inset 0 0 50px -4px rgba(255,59,48,0.60); }
  }
  @keyframes ffHotSpot { 0%,100% { opacity:0.35; } 50% { opacity:0.85; } }

  /* ════════════════════ FILE LIST POPOVER ════════════════════ */
  .ff-scrim {
    position:absolute; inset:0; z-index:40; border-radius:inherit;
    background:rgba(15,23,42,0.20); -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px);
    opacity:0; pointer-events:none; transition:opacity 220ms ease;
  }
  .ff-scrim.show { opacity:1; pointer-events:auto; }
  html.dark .ff-scrim { background:rgba(0,0,0,0.5); }

  .ff-pop {
    --ff-pop-bg:#FFFFFF; --ff-pop-bd:rgba(15,23,42,0.08);
    --ff-pop-fg:#0F172A; --ff-pop-fg3:#64748B;
    --ff-row:#F6F8FC; --ff-row-bd:rgba(15,23,42,0.05); --ff-row-hover:#EEF2F9;
    position:absolute; z-index:50; width:300px; box-sizing:border-box;
    background:var(--ff-pop-bg); border-radius:20px; border:1px solid var(--ff-pop-bd);
    box-shadow:0 26px 64px -16px rgba(15,23,42,0.42), inset 0 1px 0 rgba(255,255,255,0.85);
    padding:15px 15px 14px; font-family:'Montserrat';
    opacity:0; transform:scale(0.9) translateY(8px); transform-origin:top center; pointer-events:none;
    transition:opacity 200ms ease, transform 320ms cubic-bezier(.34,1.56,.64,1);
  }
  .ff-pop.show { opacity:1; transform:scale(1) translateY(0); pointer-events:auto; }
  html.dark .ff-pop {
    --ff-pop-bg:#1B2130; --ff-pop-bd:rgba(255,255,255,0.08);
    --ff-pop-fg:#F1F5F9; --ff-pop-fg3:#94A3B8;
    --ff-row:#141A26; --ff-row-bd:rgba(255,255,255,0.05); --ff-row-hover:#222B3B;
    box-shadow:0 26px 64px -14px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .ff-pop-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .ff-pop-title { font-size:15px; font-weight:800; color:var(--ff-pop-fg); letter-spacing:-0.01em; }
  .ff-pop-sub { margin-top:2px; font-size:11.5px; font-weight:600; color:var(--ff-pop-fg3); }
  .ff-pop-close {
    flex:none; width:26px; height:26px; border-radius:9999px; border:none; cursor:pointer;
    display:grid; place-items:center; background:var(--ff-row); color:var(--ff-pop-fg3);
    transition:background 140ms, color 140ms, transform 120ms;
  }
  .ff-pop-close:hover { background:var(--ff-row-hover); color:var(--ff-pop-fg); }
  .ff-pop-close:active { transform:scale(0.9); }
  .ff-pop-close .material-symbols-outlined { font-size:17px; }
  .ff-pop-tools { margin-top:12px; }
  .ff-pop-tools .seg { width:100%; }

  .ff-pop-body { margin-top:11px; max-height:236px; overflow:auto; display:flex; flex-direction:column; gap:6px; padding-right:2px; }
  .ff-pop-body.grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .ff-file {
    display:flex; align-items:center; gap:10px; padding:8px; border-radius:12px;
    background:var(--ff-row); border:1px solid var(--ff-row-bd); cursor:pointer;
    transition:background 140ms ease, transform 160ms cubic-bezier(.22,1,.36,1);
  }
  .ff-file:hover { background:var(--ff-row-hover); transform:translateX(2px); }
  .ff-file:active { transform:scale(0.98); }
  .ff-file-ic {
    flex:none; width:34px; height:34px; border-radius:9px; display:grid; place-items:center;
    font-size:9px; font-weight:900; letter-spacing:0.02em; color:#fff; background:var(--c,#3B82F6);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), inset 0 -2px 0 rgba(0,0,0,0.2), inset 0 0 0 1px rgba(0,0,0,0.05);
    text-shadow:0 1px 1px rgba(0,0,0,0.25);
  }
  .ff-file-meta { min-width:0; display:flex; flex-direction:column; gap:2px; }
  .ff-file-name { font-size:13px; font-weight:700; color:var(--ff-pop-fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ff-file-sub  { font-size:11px; font-weight:600; color:var(--ff-pop-fg3); }

  .ff-pop-body.grid .ff-file { flex-direction:column; align-items:center; text-align:center; gap:7px; padding:12px 6px; }
  .ff-pop-body.grid .ff-file:hover { transform:translateY(-2px); }
  .ff-pop-body.grid .ff-file-meta { align-items:center; width:100%; }
  .ff-pop-body.grid .ff-file-name { font-size:10.5px; max-width:100%; }
  .ff-pop-body.grid .ff-file-sub { display:none; }

  /* ════════════════════ DARK MODE (System A — the screenshot) ════════════════════ */
  html.dark .folder {
    --ff-body: #161618;
    --ff-border: rgba(255,255,255,0.06);
    --ff-pocket: #161618;
    --ff-pocket-edge: rgba(0,0,0,0.6);
    --ff-pocket-shadow: rgba(0,0,0,0.55);
    --ff-title: #FFFFFF;
    --ff-title-glow: var(--glow);
    --ff-sub: #9AA3AF;
    --ff-meta: #C2C9D2;
    --ff-paper: #FFFFFF;
    --ff-line: #D8DFE8;
    --ff-paper-shadow: 0 14px 30px rgba(0,0,0,0.5), 0 1px 0 rgba(0,0,0,0.3);
    --ff-shadow: 0 26px 54px -16px rgba(0,0,0,0.78), 0 8px 18px rgba(0,0,0,0.46);
    --ff-gloss: rgba(255,255,255,0.10);
    --ff-rim: rgba(0,0,0,0.5);
    --ff-panel: linear-gradient(180deg, #20232B 0%, #1A1C22 100%);
    --ff-panel-bd: rgba(255,255,255,0.06);
    --ff-panel-hi: rgba(255,255,255,0.07);
    --ff-panel-sh: rgba(0,0,0,0.45);
  }
  html.dark body { background:#0F172A; }

  /* responsive */
  @media (max-width: 640px) {
    .folder { --size: 216px; --rad: 26px; --frame: 7px; }
    .ff-stage { gap:16px; }
    .ff-title { top:120px; left:20px; } .ff-sub { top:145px; left:20px; }
    .ff-dots { top:126px; right:18px; } .ff-count { left:20px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .folder.play, .folder.play * { animation:none !important; }
  }
</style>

<script>
  var folders = Array.prototype.slice.call(document.querySelectorAll('.folder'));
  var scrim = document.getElementById('ff-scrim');
  var pop   = document.getElementById('ff-pop');
  var popTitle = document.getElementById('ff-pop-title');
  var popSub   = document.getElementById('ff-pop-sub');
  var popBody  = document.getElementById('ff-pop-body');
  var popClose = document.getElementById('ff-pop-close');
  var seg = document.getElementById('ff-seg');
  var card = document.querySelector('.card');

  var FILES = [
    { name:'Q4 Strategy',      ext:'PDF', type:'Document', size:'2.4 MB', color:'#EF4444' },
    { name:'Brand Roadmap',    ext:'FIG', type:'Figma',    size:'8.1 MB', color:'#A855F7' },
    { name:'Budget 2025',      ext:'XLS', type:'Sheet',    size:'1.2 MB', color:'#10B981' },
    { name:'Meeting Notes',    ext:'DOC', type:'Document',  size:'48 KB',  color:'#3B82F6' },
    { name:'Cover Art',        ext:'PNG', type:'Image',     size:'640 KB', color:'#F97316' },
    { name:'Demo Walkthrough', ext:'MP4', type:'Video',     size:'48 MB',  color:'#EC4899' },
    { name:'Contract v3',      ext:'PDF', type:'Document',  size:'820 KB', color:'#EF4444' },
    { name:'Logo Pack',        ext:'ZIP', type:'Archive',   size:'12 MB',  color:'#64748B' }
  ];
  var view = 'list';

  function renderFiles(){
    popBody.className = 'ff-pop-body' + (view === 'grid' ? ' grid' : '');
    popBody.innerHTML = FILES.map(function(f, i){
      return '<div class="ff-file" style="--c:' + f.color + '">'
           +   '<span class="ff-file-ic">' + f.ext + '</span>'
           +   '<span class="ff-file-meta">'
           +     '<span class="ff-file-name">' + f.name + '</span>'
           +     '<span class="ff-file-sub">' + f.type + ' · ' + f.size + '</span>'
           +   '</span>'
           + '</div>';
    }).join('');
  }

  function positionPop(folder){
    var cardRect = card.getBoundingClientRect();
    var fRect = folder.getBoundingClientRect();
    var w = 300;
    var left = (fRect.left - cardRect.left) + fRect.width/2 - w/2;
    left = Math.max(12, Math.min(left, cardRect.width - w - 12));
    var top = (fRect.top - cardRect.top) + 34;
    pop.style.left = left + 'px';
    pop.style.top  = top + 'px';
  }

  function openPop(folder){
    popTitle.textContent = folder.querySelector('.ff-title').textContent;
    popSub.textContent = (folder.classList.contains('hot') ? 'Active · ' : '') + '2,386 files · Notes & More';
    renderFiles();
    positionPop(folder);
    scrim.classList.add('show');
    pop.classList.add('show');
    if (seg.__segMove) requestAnimationFrame(function(){ seg.__segMove(); });
  }
  function closePop(){ scrim.classList.remove('show'); pop.classList.remove('show'); }

  // segmented view toggle (this script owns .active → data-seg-managed)
  Array.prototype.forEach.call(seg.querySelectorAll('button'), function(btn, i){
    btn.addEventListener('click', function(){
      Array.prototype.forEach.call(seg.querySelectorAll('button'), function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      view = (i === 1) ? 'grid' : 'list';
      renderFiles();
      if (seg.__segMove) seg.__segMove();
    });
  });

  scrim.addEventListener('click', closePop);
  popClose.addEventListener('click', closePop);
  pop.addEventListener('click', function(e){ e.stopPropagation(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closePop(); });

  // Play the entrance. `.play` is added via rAF so static / frozen-timeline / no-JS /
  // reduced-motion renders keep the finished, visible base; removed afterwards so hover
  // and tap transitions stay clean (and never re-trigger the intro).
  function play(f){
    f.classList.remove('play'); void f.offsetWidth; f.classList.add('play');
    setTimeout(function(){ f.classList.remove('play'); }, 1700);
  }
  requestAnimationFrame(function(){ folders.forEach(play); });

  folders.forEach(function(f){
    f.addEventListener('click', function(){
      f.classList.remove('tap'); void f.offsetWidth; f.classList.add('tap');
      setTimeout(function(){ f.classList.remove('tap'); }, 430);
      openPop(f);
    });
  });

  document.getElementById('ff-replay').addEventListener('click', function(){ closePop(); folders.forEach(play); });
</script>
<script src="_controls.js"></script>
<script src="_darkmode.js"></script>
</body></html>
