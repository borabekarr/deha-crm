<!doctype html>
<!-- @dsCard group="Brand" name="To-Do List" subtitle="Animated daily to-do — drag-right to complete" viewport="700x720" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="_controls.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  body { background: var(--bg-app); }
  .material-icons {
    font-family: 'Material Icons'; font-weight: normal; font-style: normal;
    line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block;
    white-space: nowrap; word-wrap: normal; direction: ltr;
    -webkit-font-feature-settings: 'liga'; font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    padding: 40px 24px 56px;
    display: flex; justify-content: center;
    background-image: radial-gradient(ellipse 80% 60% at 50% 120%, rgba(16,185,129,0.12) 0%, transparent 60%);
  }

  /* ── App surface (the white "phone" card) ─────────────────────────── */
  .todo {
    --tdo-surface:    linear-gradient(168deg, #FFFFFF 0%, #F6F8FB 100%);
    --tdo-track:      #EEF2F7;       /* faint grey rail behind task cards */
    --tdo-card:       #FFFFFF;
    --tdo-card-bd:    rgba(15,23,42,0.06);
    --tdo-ico-bg:     #F1F5F9;
    --tdo-ico-fg:     #64748B;
    --tdo-shadow:
      0 30px 70px -22px rgba(15,23,42,0.34),
      0 8px 20px -10px rgba(15,23,42,0.16),
      inset 0 1px 0 rgba(255,255,255,0.95);
    --tdo-cardshadow:
      inset 0 1px 0 rgba(255,255,255,1),
      inset 0 -2px 0 rgba(15,23,42,0.05),
      0 4px 12px -6px rgba(15,23,42,0.14);
    --td-act-bg:      var(--slate-300);   /* grey strip behind swipe-left actions */

    position: relative;
    width: 420px;
    box-sizing: border-box;
    padding: 30px 24px 22px;
    border-radius: 40px;
    background: var(--tdo-surface);
    border: 1px solid rgba(15,23,42,0.05);
    box-shadow: var(--tdo-shadow);
    font-family: var(--font-display);
    color: var(--fg1);
    user-select: none;
    overflow: hidden;
  }

  /* ── Header ───────────────────────────────────────────────────────── */
  .td-head { display: flex; align-items: flex-start; justify-content: space-between; }
  .td-month { font-size: 11px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg4); }
  .td-day { font-size: 30px; font-weight: 900; letter-spacing: -0.02em; color: var(--fg1); margin-top: 4px; line-height: 1; }
  .td-nav { display: flex; gap: 6px; }
  .td-nav button {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--tdo-card-bd);
    background: var(--tdo-card); color: var(--fg3); cursor: pointer;
    display: grid; place-items: center; padding: 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,1), 0 2px 6px -3px rgba(15,23,42,0.2);
    transition: transform 180ms cubic-bezier(.34,1.56,.64,1), color 160ms, background 160ms;
  }
  .td-nav button .material-icons { font-size: 20px; }
  .td-nav button:hover { color: var(--fg1); transform: translateY(-1px); }
  .td-nav button:active { transform: scale(0.9); }

  /* ── Calendar week ────────────────────────────────────────────────── */
  .td-week { position: relative; display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 22px; }
  .td-week-pill {
    position: absolute; top: 0; left: 0; z-index: 0;
    border-radius: 15px; background: #0F172A;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 4px 12px -4px rgba(15,23,42,0.4);
    transition: transform 420ms cubic-bezier(.22,1,.36,1), width 360ms cubic-bezier(.22,1,.36,1), height 360ms cubic-bezier(.22,1,.36,1);
    pointer-events: none;
  }
  .td-week-pill.no-anim { transition: none; }
  .td-daybtn {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 11px 0 12px; border-radius: 15px; cursor: pointer;
    border: 1px solid transparent; background: transparent;
    font-family: var(--font-display);
    transition: transform 200ms cubic-bezier(.34,1.56,.64,1), background 180ms, box-shadow 180ms;
  }
  .td-daybtn .dow { font-size: 9.5px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg4); }
  .td-daybtn .dnum { font-size: 16px; font-weight: 800; color: var(--fg3); font-variant-numeric: tabular-nums; }
  .td-daybtn:hover { background: rgba(15,23,42,0.035); }
  .td-daybtn.active {
    background: transparent;
    border-color: transparent;
  }
  .td-daybtn.active:hover { background: transparent; }
  .td-daybtn.active .dow { color: rgba(255,255,255,0.65); }
  .td-daybtn.active .dnum { color: #fff; font-weight: 900; }

  /* ── Section header / stats ───────────────────────────────────────── */
  .td-sec { display: flex; align-items: center; justify-content: space-between; margin-top: 26px; margin-bottom: 14px; }
  .td-sec h2 { margin: 0; font-size: 19px; font-weight: 900; letter-spacing: -0.015em; color: var(--fg1); }
  .td-stats { display: flex; align-items: center; gap: 20px; }
  .td-stat { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--fg3); }
  .td-stat-lbl { display: inline-flex; align-items: baseline; gap: 2px; }
  .td-stat .dot-done {
    width: 17px; height: 17px; border-radius: 50%; background: var(--brand-primary);
    display: grid; place-items: center; color: #fff;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 2px 6px -1px rgba(16,185,129,0.6);
  }
  .td-stat .dot-done .material-icons { font-size: 12px; }
  .td-stat .spin {
    width: 13px; height: 13px; border-radius: 50%; flex: none;
    border: 2px dotted var(--fg4);
  }
  .td-stat b { font-variant-numeric: tabular-nums; color: var(--fg2); }

  /* ── Task list ────────────────────────────────────────────────────── */
  .td-list { display: flex; flex-direction: column; gap: 11px; max-height: 258px; overflow-y: auto; overflow-x: hidden; padding: 4px; margin: -4px; scrollbar-width: thin; scrollbar-color: var(--slate-300) transparent; }
  .td-list::-webkit-scrollbar { width: 6px; }
  .td-list::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 9999px; }
  .td-list::-webkit-scrollbar-track { background: transparent; }
  .task-row.filtered-out { display: none; }

  /* ── Tag filter pills ── */
  .td-filters { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; padding: 4px 2px 13px; margin: 0 -2px 3px; }
  .td-filters::-webkit-scrollbar { display: none; }
  .td-filt {
    flex: none; display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 13px; border-radius: 9999px; cursor: pointer; border: 1px solid var(--tdo-card-bd);
    background: var(--tdo-card); color: var(--fg3); font-family: var(--font-display);
    font-size: 11px; font-weight: 800; letter-spacing: 0.02em; white-space: nowrap;
    box-shadow: var(--tdo-cardshadow);
    transition: background 160ms, color 160ms, border-color 160ms, transform 160ms cubic-bezier(.34,1.56,.64,1);
  }
  .td-filt .fdot { width: 8px; height: 8px; border-radius: 50%; background: var(--fcolor, var(--fg4)); flex: none; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12); }
  .td-filt .fct { font-variant-numeric: tabular-nums; opacity: 0.55; }
  .td-filt:hover { transform: translateY(-1px); color: var(--fg1); }
  .td-filt:active { transform: scale(0.95); }
  .td-filt.on { background: #0F172A; color: #fff; border-color: transparent; box-shadow: 0 5px 13px -5px rgba(15,23,42,0.45), inset 0 1px 0 rgba(255,255,255,0.14); }
  .td-filt.on .fct { opacity: 0.7; }
  html.dark .td-filt.on { background: #0B1220; }

  .task-row {
    position: relative;
    flex: none;
    border-radius: 19px;
    overflow: hidden;
    /* resting bg transparent — green complete-reveal & grey action strip are separate layers below the card */
    background: transparent;
    box-shadow: 0 0 0 transparent;
    transition: box-shadow 260ms cubic-bezier(.22,1,.36,1);
  }
  /* the green reveal label, behind the sliding card */
  .reveal {
    position: absolute; inset: 0; z-index: 2; display: flex; align-items: center; gap: 9px;
    padding-left: 22px; color: #fff; font-size: 14px; font-weight: 800;
    letter-spacing: 0.01em; text-shadow: 0 1px 2px rgba(0,0,0,0.18);
    background: var(--brand-primary);
    opacity: 0; pointer-events: none;
    /* smooth fade — no snap on cancel */
    transition: opacity 180ms ease;
  }
  .reveal .rv-check {
    width: 26px; height: 26px; border-radius: 50%;
    background: rgba(255,255,255,0.22); display: grid; place-items: center;
    box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.7);
    transform: scale(0.7); transition: transform 200ms cubic-bezier(.34,1.56,.64,1);
  }
  .reveal .rv-check .material-icons { font-size: 17px; }
  .task-row.armed .reveal .rv-check { transform: scale(1); background: rgba(255,255,255,0.34); }
  .task-row.armed { box-shadow: var(--shadow-emerald-glow); }

  /* the actual sliding white card */
  .task {
    --tag: #EF4444; --tag-bg: var(--semantic-danger-bg);
    position: relative; z-index: 3;
    display: flex; align-items: center; gap: 12px;
    padding: 15px 15px;
    background: var(--tdo-card);
    border: 1px solid var(--tdo-card-bd);
    border-radius: 19px;
    box-shadow: var(--tdo-cardshadow);
    cursor: grab;
    touch-action: pan-y;
    will-change: transform;
    /* visible end-state is the base — entrance animates FROM .preanim */
    opacity: 1;
  }
  /* preanim matches row-out direction — enter = reverse of exit (both horizontal) */
  .task.preanim { opacity: 0; transform: translateX(38px) scale(0.93); }
  .task.anim { transition: opacity 340ms ease, transform 420ms cubic-bezier(.22,1,.38,1); }
  .task.dragging { cursor: grabbing; transition: none; box-shadow: 0 18px 34px -14px rgba(15,23,42,0.4), var(--tdo-cardshadow); }
  /* no overshoot on settle-back — prevents the "spawn past origin" artefact */
  .task.settling { transition: transform 320ms cubic-bezier(.4,0,.06,1); }
  /* hover lift (only when not dragging / completed) */
  .task-row:not(.is-done) .task:not(.dragging):hover { border-color: var(--tag); box-shadow: 0 0 0 1px var(--tag), var(--tdo-cardshadow); transition: border-color 160ms ease, box-shadow 160ms ease; }
  .task:active { cursor: grabbing; }

  /* checkbox */
  .t-check {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--slate-300); background: var(--tdo-card);
    display: grid; place-items: center; cursor: pointer; padding: 0;
    color: #fff; position: relative;
    transition: transform 220ms cubic-bezier(.34,1.56,.64,1), border-color 200ms, background 200ms;
  }
  .t-check .material-icons { font-size: 16px; opacity: 0; transform: scale(0.4); transition: opacity 200ms, transform 240ms cubic-bezier(.34,1.56,.64,1); }
  .t-check:hover { border-color: var(--brand-primary-300); }

  /* icon tile */
  .t-ico {
    flex-shrink: 0; width: 42px; height: 42px; border-radius: 13px;
    display: grid; place-items: center; overflow: hidden;
    background-color: var(--tag);
    background-image:
      radial-gradient(ellipse at top right, rgba(255,255,255,0.18) 0%, transparent 55%),
      linear-gradient(rgba(255,255,255,0.13) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.13) 1px, transparent 1px);
    background-size: cover, 7px 7px, 7px 7px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.55),
      inset 0 -2px 0 rgba(15,23,42,0.20),
      inset 0 0 0 1px rgba(15,23,42,0.12),
      0 2px 6px rgba(0,0,0,0.10);
    transition: transform 240ms cubic-bezier(.34,1.56,.64,1);
  }
  .t-ico .material-icons { font-size: 21px; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.35); filter: drop-shadow(0 1px 1px rgba(0,0,0,0.15)); }

  .t-main { flex: 1; min-width: 0; }
  .t-title { font-size: 14.5px; font-weight: 800; color: var(--fg1); letter-spacing: -0.015em; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .t-badge {
    display: inline-flex; align-items: center; gap: 4px; margin-top: 7px;
    font-size: 9.5px; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase; line-height: 1;
    padding: 4px 10px 4px 8px; border-radius: 9999px;
    background: var(--tag); color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.30);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.30), inset 0 -1.5px 0 rgba(0,0,0,0.18), inset 0 0 0 1px rgba(0,0,0,0.06);
  }
  .t-badge .material-icons { font-size: 11px; margin-left: -1px; }
  .t-badge.pop { animation: badge-pop 460ms cubic-bezier(.34,1.7,.5,1) both; }
  @keyframes badge-pop { 0% { transform: scale(0); } 70% { transform: scale(1.18); } 100% { transform: scale(1); } }

  /* right side: time, and the hover "Complete" pill */
  .t-right { flex-shrink: 0; display: flex; align-items: center; position: relative; min-width: 56px; justify-content: flex-end; }
  .t-time { font-size: 12.5px; font-weight: 700; color: var(--fg4); font-variant-numeric: tabular-nums; transition: opacity 200ms, transform 200ms; white-space: nowrap; }
  .t-complete {
    position: absolute; right: 0;
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 12px; border-radius: 9999px; border: none; cursor: pointer;
    background: var(--brand-primary); color: #fff; font-family: var(--font-display);
    font-size: 11.5px; font-weight: 800; white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0,0,0,0.18);
    box-shadow: var(--shadow-emerald-glow-sm), inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -2px 0 rgba(0,0,0,0.2);
    background-image: linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 9px 9px;
    opacity: 0; transform: translateX(8px) scale(0.9); pointer-events: none;
    transition: opacity 200ms, transform 240ms cubic-bezier(.34,1.56,.64,1), filter 160ms;
  }
  .t-complete .material-icons { font-size: 14px; }
  .t-complete:hover { transform: translateX(0) scale(1.04); filter: brightness(1.06); }
  .t-complete:active { transform: scale(0.96); }
  /* (complete-on-hover pill removed — completion is via the checkbox or drag-right) */

  /* ── swipe-left action buttons (edit / delete) ── */
  .actions { position:absolute; inset:0; z-index:1; display:flex; align-items:center; justify-content:flex-end; gap:8px; padding-right:13px; }
  .actions::before { content:''; position:absolute; inset:0; z-index:0; background: var(--td-act-bg); }
  .t-act { position:relative; z-index:1; width:48px; height:48px; border-radius:14px; border:none; cursor:pointer; display:grid; place-items:center; color:#fff;
           background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
           background-size: 8px 8px;
           box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), inset 0 -2px 0 rgba(0,0,0,0.2); transition: filter 150ms, transform 160ms cubic-bezier(.34,1.56,.64,1); }
  .t-act .material-icons { font-size:18px; background:rgba(255,255,255,0.18); border-radius:50%; padding:5px; box-shadow: 0 3px 7px -1px rgba(15,23,42,0.5), 0 1px 2px rgba(15,23,42,0.35); }
  .t-act.del { background-color:var(--semantic-danger); }
  .t-act.edit { background-color:#0F172A; }
  .t-act:hover { filter:brightness(1.1); }
  .t-act:active { transform:scale(0.9); }
  .task-row.reordering { z-index:5; overflow:visible; }
  .task-row.reordering .task { box-shadow: 0 22px 44px -14px rgba(15,23,42,0.45), var(--tdo-cardshadow); cursor:grabbing; }

  /* ── Completed state ──────────────────────────────────────────────── */
  .task-row.is-done .task {
    background: color-mix(in srgb, var(--brand-primary) 8%, var(--tdo-card));
    border-color: color-mix(in srgb, var(--brand-primary) 26%, transparent);
    cursor: default;
  }
  .task-row.is-done { box-shadow: 0 0 0 transparent; }
  .task-row.is-done .t-check {
    border-color: var(--brand-primary); background: var(--brand-primary);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 4px 12px -2px rgba(16,185,129,0.6);
  }
  .task-row.is-done .t-check .material-icons { opacity: 1; transform: scale(1); }
  .task-row.is-done .t-title { color: var(--fg3); text-decoration: line-through; text-decoration-color: var(--slate-300); }
  .task-row.is-done .t-ico { background-color: var(--brand-primary); }
  .task-row.is-done .t-complete { display: none; }
  .task-row.is-done .t-time { opacity: 1 !important; transform: none !important; color: var(--brand-primary-600); }
  .task-row.is-done:hover .t-time { opacity: 1; transform: none; }
  .task-row.glow .task { animation: done-glow 900ms cubic-bezier(.22,1,.36,1); }
  /* confetti burst */
  @keyframes confetti-burst { 0%{transform:translate(0,0) scale(1);opacity:1;} 100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;} }
  @keyframes done-glow {
    0%   { box-shadow: 0 0 0 0 color-mix(in srgb, var(--brand-primary) 50%, transparent), var(--tdo-cardshadow); }
    40%  { box-shadow: 0 0 0 6px color-mix(in srgb, var(--brand-primary) 30%, transparent), 0 14px 30px -8px rgba(16,185,129,0.5); }
    100% { box-shadow: 0 0 0 0 transparent, var(--tdo-cardshadow); }
  }

  /* tap micro-pop */
  .task.tap { animation: tap-pop 320ms cubic-bezier(.34,1.56,.64,1); }
  @keyframes tap-pop { 0% { transform: scale(1); } 45% { transform: scale(0.985); } 100% { transform: scale(1); } }

  /* filter morph — tasks ease OUT (soft blur, settle down) when hidden, glide IN when shown · slow + fluent */
  .task.morphing-out { animation: task-morph-out 460ms cubic-bezier(.4,0,.2,1) forwards; }
  @keyframes task-morph-out { 0%{opacity:1;filter:blur(0);transform:scale(1) translateY(0);} 100%{opacity:0;filter:blur(4px);transform:scale(.94) translateY(-2px);} }
  .task.morphing-in { animation: task-morph-in 560ms cubic-bezier(.22,1,.36,1); }
  @keyframes task-morph-in { 0%{opacity:0;filter:blur(6px);transform:scale(.96) translateY(4px);} 60%{opacity:1;filter:blur(0);} 100%{opacity:1;filter:blur(0);transform:scale(1) translateY(0);} }

  /* ── Bottom bar ───────────────────────────────────────────────────── */
  .td-bar {
    display: flex; align-items: center; gap: 10px;
    margin-top: 22px;
    padding: 5px;
    border-radius: 9999px;
    background: var(--shell-bg);
    border: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), inset 0 0 0 1px rgba(15,23,42,0.04);
    transition: transform 200ms cubic-bezier(.34,1.56,.64,1), box-shadow 200ms;
  }
  .td-bar:hover { transform: translateY(-2px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), inset 0 0 0 1px rgba(15,23,42,0.04), 0 10px 22px -8px rgba(15,23,42,0.28); }
  /* add button + its grey bar act as ONE unit on hover: the whole bar lifts
     together (grey stays grey, the button does NOT move independently) */
  .td-bar:has(.btn-add:hover) {
    transform: translateY(-2px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), inset 0 0 0 1px rgba(15,23,42,0.04), 0 12px 26px -8px rgba(15,23,42,0.32);
  }
  .td-bar:has(.btn-add:hover) .btn-add { transform: none; filter: brightness(1.1); }
  .td-bar:has(.btn-add:active) { transform: translateY(-1px); }
  .td-bar:has(.btn-add:active) .btn-add { transform: scale(0.985); }
  .bar-ico {
    width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
    background: transparent; color: var(--fg3); display: grid; place-items: center; padding: 0;
    transition: background 160ms, color 160ms, transform 180ms cubic-bezier(.34,1.56,.64,1);
  }
  .bar-ico:hover { background: var(--bg-chip); color: var(--fg1); }
  .bar-ico:active { transform: scale(0.9); }
  .bar-ico .material-icons { font-size: 22px; }
  .btn-add {
    flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 22px; border-radius: 9999px; border: none; cursor: pointer;
    background: #0F172A; color: #fff; font-family: var(--font-display);
    font-size: 14px; font-weight: 800; letter-spacing: 0.01em;
    background-image: linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 9px 9px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), inset 0 -2px 0 rgba(0,0,0,0.4), 0 8px 20px -8px rgba(15,23,42,0.6);
    transition: transform 200ms cubic-bezier(.34,1.56,.64,1), filter 160ms, box-shadow 200ms;
  }
  .btn-add { font-weight: 900; }
  .btn-add .material-icons { font-size: 22px; -webkit-text-stroke: 0.7px currentColor; transition: transform 300ms cubic-bezier(.34,1.56,.64,1); }
  .btn-add:hover { filter: brightness(1.12); box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), inset 0 -2px 0 rgba(0,0,0,0.4), 0 10px 22px -10px rgba(15,23,42,0.6); }
  .btn-add:active { transform: scale(0.97); }
  .btn-add.flash { animation: add-flash 460ms cubic-bezier(.22,1,.36,1); }
  @keyframes add-flash {
    0% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), inset 0 -2px 0 rgba(0,0,0,0.4), 0 0 0 0 rgba(255,255,255,0.9); }

<script>
/* =========================================================================

(function () {

    { id: 't5', title: 'Reply to investor email', time: '11:30 AM', priority: 'urgent',           icon: 'mail' },
    { id: 't6', title: 'Read industry report',    time: '7:00 PM',  priority: 'important',        icon: 'menu_book', repeat: 'repeat', cad: 'weekly', dow: 6 }

    { title: 'Refactor auth module', time: '11:00 AM', priority: 'urgent',           icon: 'lock' },
    { title: 'Polish empty states',  time: '1:00 PM',  priority: 'important',        icon: 'brush' },

  var DAY_TASKS = {

      { id:'mo1', title:'Weekly planning sync',      time:'9:00 AM',  priority:'urgent_important', icon:'event_note' },
      { id:'mo2', title:'Approve marketing budget',  time:'11:00 AM', priority:'urgent',           icon:'account_balance' },

  var DOW = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];

  function renderPris() {
    popPris.innerHTML = Object.keys(PRIORITY).map(function (k) {
      var p = PRIORITY[k];
      return '<button class="td-pop-pri' + (k === st.pri ? ' on' : '') + '" data-pri="' + k + '" style="--tag:' + p.color + '">' + badgeHTML(p) + '</button>';
    }).join('');
  }
  function renderCads() {
    popCads.innerHTML = CADS.map(function (c) {
      return '<button class="td-pop-cad' + (c === st.cad ? ' on' : '') + '" data-cad="' + c + '">' + CADLBL[c] + '</button>';
    }).join('');
  }
  function renderDays() {
    popDays.innerHTML = DOWS.map(function (d, i) {
      return '<button class="td-pop-dow' + (i === st.dow ? ' on' : '') + '" data-dow="' + i + '">' + d + '</button>';
    }).join('');
  }
  function syncSchedule() {
    var rep = st.repeat === 'repeat';
    popRep.querySelectorAll('button').forEach(function (b) { b.classList.toggle('active', b.dataset.rep === st.repeat); });
    if (popRep.__segMove) popRep.__segMove();
    popRepBox.hidden = !rep;
    if (!rep) return;
    if (st.cad === 'daily') {
      popOnBox.hidden = true;
    } else if (st.cad === 'weekly') {
      popOnBox.hidden = false; popOnLbl.textContent = 'On'; popDays.hidden = false; popDom.hidden = true;
    } else {
      popOnBox.hidden = false; popOnLbl.textContent = 'On day'; popDays.hidden = true; popDom.hidden = false; popDom.value = st.dom;
    }
  }
  function syncIcon() {
    var p = PRIORITY[st.pri] || PRIORITY[DEFAULT_PRI];
    popIc.querySelector('.material-icons').textContent = (popMode !== 'add' && popRow) ? popRow._task.icon : p.bi;
    popIc.style.setProperty('--tag', p.color); popIc.style.setProperty('--tag-bg', p.bg);
  }

  function openPop(row, mode) {
    popMode = mode || 'view'; popRow = row;
    if (row) {
      var t = row._task;
      st.pri = t.priority; st.repeat = t.repeat || 'once';
      st.cad = t.cad || 'weekly'; st.dow = (t.dow != null ? t.dow : 1); st.dom = (t.dom != null ? t.dom : 1);
      popTitle.value = t.title; popTime.value = t.time;
      popHd.textContent = (mode === 'edit') ? 'Edit task' : 'Task details';
      popSaveTxt.textContent = 'Save changes'; popSaveIc.textContent = 'check';
    } else {
      st.pri = DEFAULT_PRI; st.repeat = 'once'; st.cad = 'weekly'; st.dow = 1; st.dom = 1;
      popTitle.value = ''; popTime.value = '';
      popHd.textContent = 'New task'; popSaveTxt.textContent = 'Add task'; popSaveIc.textContent = 'add';
    }
    renderPris(); renderCads(); renderDays(); syncSchedule(); syncIcon();
    scrim.classList.add('show'); pop.classList.add('show');
    if (mode === 'edit' || mode === 'add') setTimeout(function () { popTitle.focus(); if (mode === 'edit') popTitle.select(); }, 140);
  }
  function closePop() { scrim.classList.remove('show'); pop.classList.remove('show'); popRow = null; }

  popPris.addEventListener('click', function (e) {
    var b = e.target.closest('[data-pri]'); if (!b) return;
    st.pri = b.dataset.pri;
    popPris.querySelectorAll('.td-pop-pri').forEach(function (x) { x.classList.toggle('on', x === b); });
    syncIcon();
  });
  popRep.addEventListener('click', function (e) {
    var b = e.target.closest('[data-rep]'); if (!b) return;
    st.repeat = b.dataset.rep; syncSchedule();
  });
  popCads.addEventListener('click', function (e) {
    var b = e.target.closest('[data-cad]'); if (!b) return;
    st.cad = b.dataset.cad;
    popCads.querySelectorAll('.td-pop-cad').forEach(function (x) { x.classList.toggle('on', x === b); });
    syncSchedule();
  });
  popDays.addEventListener('click', function (e) {
    var b = e.target.closest('[data-dow]'); if (!b) return;
    st.dow = +b.dataset.dow;
    popDays.querySelectorAll('.td-pop-dow').forEach(function (x) { x.classList.toggle('on', x === b); });
  });
  popDom.addEventListener('change', function () { st.dom = +popDom.value; });

  popSave.addEventListener('click', function () {
    var p = PRIORITY[st.pri] || PRIORITY[DEFAULT_PRI];
    if (popMode === 'add') {
      insertTask({
        id: 't' + (uid++), title: popTitle.value.trim() || 'New task', time: popTime.value.trim() || 'Anytime',
        priority: st.pri, icon: p.bi, repeat: st.repeat, cad: st.cad, dow: st.dow, dom: st.dom
      });
      closePop(); return;
    }
    if (!popRow) { closePop(); return; }
    var t = popRow._task;
    t.title = popTitle.value.trim() || t.title;
    t.time = popTime.value.trim() || t.time;
    t.priority = st.pri; t.repeat = st.repeat; t.cad = st.cad; t.dow = st.dow; t.dom = st.dom;
    var card = popRow.querySelector('.task');
    card.style.setProperty('--tag', p.color); card.style.setProperty('--tag-bg', p.bg);
    popRow.dataset.pri = t.priority;
    popRow.classList.toggle('is-repeat', t.repeat === 'repeat');
    popRow.querySelector('.t-title').textContent = t.title;
    popRow.querySelector('.t-time').textContent = t.time;
    var badge = popRow.querySelector('.t-badge'); badge.innerHTML = badgeHTML(p);
    badge.classList.remove('pop'); void badge.offsetWidth; badge.classList.add('pop');
    updateStats();
    closePop();
  });
  popX.addEventListener('click', closePop);
  scrim.addEventListener('click', closePop);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closePop(); });

  buildWeek();
  buildFilters();
  render();
})();

</script>
<script src="_darkmode.js"></script>
</body></html>
