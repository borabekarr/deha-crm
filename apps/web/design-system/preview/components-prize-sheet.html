<!doctype html>
<!-- @dsCard group="Brand" name="Prize Sheet" subtitle="Mobile bottom sheet + desktop dialog · dot surface, grid claim button, icon" viewport="760x1240" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  body { background:#F8FAFC; }
  .frame {
    padding: 30px 24px 36px;
    display: flex; flex-direction: column; align-items: center; gap: 34px;
    background-image: radial-gradient(ellipse at top right, rgba(16,185,129,0.10) 0%, rgba(248,250,252,1) 50%, #FFFFFF 100%);
  }
  .demo { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .demo-cap { display: inline-flex; align-items: center; gap: 7px; font-family: 'Montserrat'; font-size: 10.5px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg4); }
  .demo-cap .material-symbols-outlined { font-size: 15px; color: #10B981; }
  .demo-hint { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10.5px; color: var(--fg4); margin-top: -4px; }

  /* ════════════════════════ SHARED PANEL (sheet + modal) ════════════════════════ */
  .panel {
    --sheet-bg: #FFFFFF; --sheet-edge: rgba(15,23,42,0.06); --sheet-hi: rgba(255,255,255,0.9);
    --grip: rgba(15,23,42,0.18); --title: #0F172A; --desc: #64748B; --wallet-bg: #F1F5F9;
    --dot: rgba(15,23,42,0.06);
    --chrome: linear-gradient(180deg,#475569 0%,#0F172A 46%,#334155 74%,#0F172A 100%);
    --chrome-hi: rgba(255,255,255,0.85); --chrome-glow: rgba(15,23,42,0.18);
    position: absolute; box-sizing: border-box;
    display: flex; flex-direction: column; align-items: center;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(46,230,197,0.10) 0%, transparent 46%),
      var(--sheet-bg);
  }
  /* dot texture across the whole surface (borrowed from the statistics graph card),
     fading out toward the bottom so the gridded button stays clean */
  .panel::before {
    content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none; border-radius: inherit;
    background-image: radial-gradient(circle, var(--dot) 1.1px, transparent 1.4px);
    background-size: 22px 22px;
    -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 52%, transparent 86%);
            mask-image: linear-gradient(to bottom, #000 0%, #000 52%, transparent 86%);
  }

  .grip { width: 42px; height: 5px; border-radius: 3px; background: var(--grip); margin-bottom: 6px; flex-shrink: 0; cursor: grab; z-index: 3; }
  .confetti { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
  .panel-x {
    position: absolute; top: 16px; right: 16px; z-index: 5;
    width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer;
    display: grid; place-items: center; color: var(--desc);
    background: var(--wallet-bg); transition: background 150ms, transform 120ms;
  }
  .panel-x:hover { transform: scale(1.06); }
  .panel-x:active { transform: scale(0.92); }
  .panel-x .material-icons { font-size: 18px; }

  .prize {
    position: relative; z-index: 3; flex: 1; width: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
    transition: transform 460ms cubic-bezier(.16,1.16,.3,1), opacity 320ms ease;
  }

  .amount {
    font-size: 64px; font-weight: 900; line-height: 0.92; letter-spacing: -0.03em;
    background: var(--chrome);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 1px 0 var(--chrome-hi)) drop-shadow(0 6px 18px var(--chrome-glow));
    transform: scale(0.84); opacity: 0;
    transition: transform 520ms cubic-bezier(.16,1.5,.3,1) 120ms, opacity 360ms ease 120ms;
  }
  .amount .cur { font-size: 42px; vertical-align: 0.18em; margin-right: 2px; }
  .panel.is-open .amount { transform: scale(1); opacity: 1; }

  .wontag {
    margin-top: -6px;
    transform: rotate(-7deg) translateY(8px) scale(0.9); opacity: 0;
    display: inline-flex; align-items: center; justify-content: center;
    padding: 7px 16px; border-radius: 9px;
    font-size: 13px; font-weight: 900; letter-spacing: 0.14em; color: #1E293B;
    background: linear-gradient(160deg, #ffffff 0%, #e2e8f0 38%, #aeb8c6 62%, #f1f5f9 100%);
    box-shadow: 0 6px 14px rgba(4,7,11,0.30), inset 0 1px 0 rgba(255,255,255,0.95), inset 0 -2px 2px rgba(100,116,139,0.5), inset 0 0 0 1px rgba(255,255,255,0.4);
    text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    transition: transform 520ms cubic-bezier(.16,1.5,.3,1) 220ms, opacity 360ms ease 220ms;
  }
  .panel.is-open .wontag { transform: rotate(-7deg) translateY(0) scale(1); opacity: 1; }

  .prize-title {
    margin-top: 34px; font-size: 21px; font-weight: 800; letter-spacing: -0.01em; color: var(--title);
    opacity: 0; transform: translateY(8px);
    transition: transform 420ms ease 320ms, opacity 420ms ease 320ms;
  }
  .prize-desc {
    margin-top: 8px; max-width: 250px; font-size: 13.5px; font-weight: 500; line-height: 1.5; color: var(--desc);
    opacity: 0; transform: translateY(8px);
    transition: transform 420ms ease 380ms, opacity 420ms ease 380ms;
  }
  .panel.is-open .prize-title, .panel.is-open .prize-desc { opacity: 1; transform: translateY(0); }

  /* claim button — grid texture (borrowed from .sg-cta) layered over the gradient */
  .claim-btn, .fab, .panel-x { -webkit-tap-highlight-color: transparent; outline: none; }
  .claim-btn {
    position: relative; z-index: 3; width: 100%; margin-top: 4px;
    padding: 17px; border: none; cursor: pointer; overflow: hidden;
    border-radius: 9999px;
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    font-family: 'Montserrat'; font-size: 16px; font-weight: 800; letter-spacing: 0.01em; color: #06231d;
    background-image:
      linear-gradient(rgba(255,255,255,0.16) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.16) 1px, transparent 1px),
      linear-gradient(100deg, #2EE6C5 0%, #4FE39A 48%, #B6F25B 100%);
    background-size: 14px 14px, 14px 14px, cover;
    box-shadow: 0 14px 34px -8px rgba(46,230,197,0.6), 0 4px 10px rgba(15,23,42,0.16), inset 0 1px 0 rgba(255,255,255,0.6), inset 0 -2px 0 rgba(0,40,30,0.2);
    opacity: 0; transform: translateY(14px);
    transition: transform 220ms cubic-bezier(.22,1,.36,1), box-shadow 220ms, opacity 420ms ease 440ms, filter 200ms;
  }
  .claim-btn .material-symbols-outlined { font-size: 19px; }
  .panel.is-open .claim-btn { opacity: 1; transform: translateY(0); }
  .claim-btn:hover { box-shadow: 0 18px 42px -8px rgba(46,230,197,0.78), 0 6px 14px rgba(15,23,42,0.18), inset 0 1px 0 rgba(255,255,255,0.65), inset 0 -2px 0 rgba(0,40,30,0.2); transform: translateY(-1px); }
  .claim-btn.pressed { transform: scale(0.93); box-shadow: 0 22px 50px -6px rgba(46,230,197,0.9), inset 0 1px 0 rgba(255,255,255,0.7); }

  /* success state */
  .success {
    position: absolute; inset: 0; z-index: 4;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 30px;
    opacity: 0; pointer-events: none; transform: translateY(10px);
    transition: opacity 360ms ease, transform 460ms cubic-bezier(.16,1.16,.3,1);
  }
  .panel.claimed .success { opacity: 1; transform: translateY(0); }
  .panel.claimed .prize, .panel.claimed .claim-btn {
    opacity: 0; transform: translateY(-14px) scale(0.96); pointer-events: none;
    /* override the staggered entrance transition (which delays opacity 440ms) so the
       button fades out promptly on click instead of lingering opaque over the success screen */
    transition: transform 340ms cubic-bezier(.16,1.16,.3,1), opacity 200ms ease;
  }

  .check {
    width: 76px; height: 76px; border-radius: 50%; display: grid; place-items: center;
    background: linear-gradient(160deg, #34D399 0%, #10B981 100%);
    box-shadow: 0 14px 34px -6px rgba(16,185,129,0.6), inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -3px 0 rgba(0,40,30,0.22);
    transform: scale(0);
  }
  .panel.claimed .check { animation: pop 560ms cubic-bezier(.16,1.5,.3,1) 80ms forwards; }
  @keyframes pop { 0%{transform:scale(0)} 60%{transform:scale(1.12)} 100%{transform:scale(1)} }
  .check .material-icons { color:#fff; font-size: 42px; text-shadow: 0 1px 2px rgba(0,40,30,0.3); }

  .success-title { margin-top: 22px; font-size: 21px; font-weight: 800; color: var(--title); }
  .success-desc  { margin-top: 7px; font-size: 13.5px; font-weight: 500; color: var(--desc); }
  .wallet {
    margin-top: 20px; width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 15px 18px; border-radius: 18px; background: var(--wallet-bg); border: 1px solid var(--sheet-edge);
    box-shadow: inset 0 1px 0 var(--sheet-hi);
  }
  .wallet-l { display:flex; align-items:center; gap: 11px; }
  .wallet-ic {
    width: 38px; height: 38px; border-radius: 11px; display:grid; place-items:center; color:#fff;
    background: linear-gradient(160deg, #34D399, #10B981);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -2px 0 rgba(0,40,30,0.2);
  }
  .wallet-ic .material-symbols-outlined { font-size: 20px; }
  .wallet-lbl { font-size: 11px; font-weight: 700; color: var(--desc); text-transform: uppercase; letter-spacing: 0.08em; }
  .wallet-bal { font-size: 17px; font-weight: 900; color: var(--title); letter-spacing: -0.01em; }
  .wallet-bal .gain { color: #10B981; font-size: 12px; font-weight: 800; margin-left: 6px; }

  /* trigger pill — shared by both frames */
  .fab {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 12;
    display: inline-flex; align-items: center; gap: 9px; padding: 15px 30px; border: none; cursor: pointer;
    border-radius: 9999px; font-family: 'Montserrat'; font-size: 15px; font-weight: 800; letter-spacing: 0.01em; color: #06231d;
    background: linear-gradient(100deg, #2EE6C5 0%, #4FE39A 48%, #B6F25B 100%);
    box-shadow: 0 12px 30px -8px rgba(46,230,197,0.6), 0 4px 10px rgba(15,23,42,0.18), inset 0 1px 0 rgba(255,255,255,0.6), inset 0 -2px 0 rgba(0,40,30,0.18);
    transition: transform 200ms cubic-bezier(.22,1,.36,1), box-shadow 200ms, opacity 300ms;
  }
  .fab .material-symbols-outlined { font-size: 19px; }
  .fab:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 16px 38px -8px rgba(46,230,197,0.72), 0 6px 14px rgba(15,23,42,0.2), inset 0 1px 0 rgba(255,255,255,0.65), inset 0 -2px 0 rgba(0,40,30,0.18); }
  .fab:active { transform: translateX(-50%) scale(0.96); }

  /* ════════════════════════ PHONE FRAME ════════════════════════ */
  .device {
    position: relative; width: 320px; height: 640px; border-radius: 52px; padding: 11px;
    background: linear-gradient(155deg, #2b313c 0%, #11141b 60%, #05070b 100%);
    box-shadow: 0 40px 90px -20px rgba(15,23,42,0.55), 0 10px 30px rgba(15,23,42,0.30), inset 0 1px 1px rgba(255,255,255,0.18), inset 0 -2px 3px rgba(0,0,0,0.6);
  }
  .screen { position: relative; width: 100%; height: 100%; border-radius: 42px; overflow: hidden; background: var(--app-bg, #EEF2F7); isolation: isolate; }
  .notch { position: absolute; top: 9px; left: 50%; transform: translateX(-50%); width: 104px; height: 26px; border-radius: 14px; background: #05070b; z-index: 6; }
  .home-ind { position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%); width: 110px; height: 5px; border-radius: 3px; background: var(--home, rgba(15,23,42,0.28)); z-index: 30; }

  .app { position: absolute; inset: 0; padding: 58px 18px 0; display: flex; flex-direction: column; gap: 12px; transition: filter 420ms ease, transform 420ms ease; }
  .app-title { height: 22px; width: 60%; border-radius: 7px; background: var(--ph, rgba(15,23,42,0.10)); }
  .app-sub   { height: 12px; width: 38%; border-radius: 6px; background: var(--ph, rgba(15,23,42,0.07)); margin-top:-4px; }
  .app-tile  { height: 86px; border-radius: 18px; background: var(--ph, rgba(15,23,42,0.06)); }
  .app-row   { display:flex; gap: 12px; }
  .app-row > div { flex:1; height: 64px; border-radius: 16px; background: var(--ph, rgba(15,23,42,0.06)); }
  .device.sheet-open .app { filter: blur(3px) saturate(0.9); transform: scale(0.985); }

  .overlay { position: absolute; inset: 0; z-index: 14; background: rgba(4,7,11,0.55); -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); opacity: 0; pointer-events: none; transition: opacity 420ms ease; }
  .device.sheet-open .overlay { opacity: 1; pointer-events: auto; }

  .sheet {
    left: 0; right: 0; bottom: 0; z-index: 16; height: 60%; padding: 14px 26px 30px;
    border-radius: 34px 34px 42px 42px;
    border-top: 1px solid var(--sheet-edge); box-shadow: 0 -20px 50px -10px rgba(4,7,11,0.4), inset 0 1px 0 var(--sheet-hi);
    transform: translateY(110%); transition: transform 560ms cubic-bezier(.16,1.16,.3,1); touch-action: none;
  }
  .device.sheet-open .sheet { transform: translateY(0); }
  .device.dragging .sheet { transition: none; }

  /* ════════════════════════ DESKTOP FRAME ════════════════════════ */
  .desktop {
    position: relative; width: 660px; height: 452px; border-radius: 16px; overflow: hidden;
    background: var(--win-bg, #FFFFFF);
    box-shadow: 0 40px 90px -24px rgba(15,23,42,0.45), 0 12px 30px rgba(15,23,42,0.16), inset 0 0 0 1px rgba(15,23,42,0.06);
  }
  .dbar { position: relative; z-index: 6; height: 42px; display: flex; align-items: center; gap: 8px; padding: 0 16px; background: var(--bar-bg, #F3F5F8); border-bottom: 1px solid var(--bar-bd, #E6EAF0); }
  .dbar .tl { width: 11px; height: 11px; border-radius: 50%; }
  .dbar .tl.r { background: #FF5F57; } .dbar .tl.y { background: #FEBC2E; } .dbar .tl.g { background: #28C840; }
  .durl { margin-left: 14px; flex: 1; max-width: 320px; height: 24px; border-radius: 7px; background: var(--url-bg, #FFFFFF); border: 1px solid var(--bar-bd, #E6EAF0); display: flex; align-items: center; gap: 6px; padding: 0 11px; font-family: 'Montserrat'; font-size: 11px; font-weight: 600; color: var(--fg4); }
  .durl .material-symbols-outlined { font-size: 13px; }
  .dscreen { position: absolute; top: 42px; left: 0; right: 0; bottom: 0; overflow: hidden; isolation: isolate; }

  .dapp { position: absolute; inset: 0; display: flex; transition: filter 420ms ease, transform 420ms ease; }
  .dapp-rail { width: 64px; flex-shrink: 0; background: var(--ph2, rgba(15,23,42,0.04)); border-right: 1px solid var(--ph2, rgba(15,23,42,0.05)); }
  .dapp-main { flex: 1; padding: 26px 28px; display: flex; flex-direction: column; gap: 16px; }
  .dapp-h { height: 24px; width: 200px; border-radius: 7px; background: var(--ph, rgba(15,23,42,0.08)); }
  .dapp-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .dapp-grid > div { height: 78px; border-radius: 14px; background: var(--ph, rgba(15,23,42,0.055)); }
  .dapp-wide { height: 120px; border-radius: 16px; background: var(--ph, rgba(15,23,42,0.05)); }
  .desktop.modal-open .dapp { filter: blur(4px) saturate(0.92); transform: scale(0.992); }

  .doverlay { position: absolute; inset: 0; z-index: 14; background: rgba(4,7,11,0.45); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity 360ms ease; }
  .desktop.modal-open .doverlay { opacity: 1; pointer-events: auto; }

  /* grey outer shell — borrowed from the theme-editor's .te-outer bezel */
  .modal-shell {
    position: absolute; left: 50%; top: 50%; z-index: 16; box-sizing: border-box;
    padding: 9px; border-radius: 28px; background: var(--shell-bg, #D4DCE8);
    box-shadow: 0 32px 70px -22px rgba(4,7,11,0.5), 0 8px 20px rgba(15,23,42,0.14);
    transform: translate(-50%, -46%) scale(0.9); opacity: 0; pointer-events: none;
    transition: transform 520ms cubic-bezier(.16,1.3,.3,1), opacity 300ms ease;
  }
  .desktop.modal-open .modal-shell { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }

  /* minimized desktop popover — sits inside the grey shell (static, not absolute) */
  .modal {
    position: relative; width: 296px; height: 360px; padding: 24px 24px 22px;
    border-radius: 20px; border: 1px solid var(--sheet-edge);
    box-shadow: inset 0 1px 0 var(--sheet-hi);
  }
  .modal .amount { font-size: 54px; }
  .modal .amount .cur { font-size: 36px; }
  .modal .prize-title { margin-top: 22px; font-size: 19px; }
  .modal .prize-desc { margin-top: 7px; max-width: 224px; font-size: 13px; }
  .modal .claim-btn { padding: 15px; font-size: 15px; }
  .modal .success-title { margin-top: 18px; font-size: 19px; }
  .modal .wallet { margin-top: 16px; }
  .modal .panel-x { top: 12px; right: 12px; }

  /* minimized desktop trigger + grid-texture background (matches the claim button) */
  #desktop .fab.fab-grid {
    padding: 12px 24px; font-size: 14px;
    background-image:
      linear-gradient(rgba(255,255,255,0.16) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.16) 1px, transparent 1px),
      linear-gradient(100deg, #2EE6C5 0%, #4FE39A 48%, #B6F25B 100%);
    background-size: 14px 14px, 14px 14px, cover;
  }
  #desktop .fab.fab-grid .material-symbols-outlined { font-size: 17px; }

  /* ════════════════════════ DARK MODE (System A) ════════════════════════ */
  html.dark .frame { background-image: none; }
  html.dark .screen { --app-bg: #0B0F16; }
  html.dark .app { --ph: rgba(255,255,255,0.05); }
  html.dark .home-ind { --home: rgba(255,255,255,0.32); }
  html.dark .desktop { --win-bg: #0B0F16; --bar-bg: #11151d; --bar-bd: rgba(255,255,255,0.07); --url-bg: rgba(255,255,255,0.04); }
  html.dark .dapp { --ph: rgba(255,255,255,0.05); --ph2: rgba(255,255,255,0.03); }
  html.dark .panel {
    --sheet-bg: linear-gradient(180deg, #11151d 0%, #090c12 100%);
    --sheet-edge: rgba(255,255,255,0.07); --sheet-hi: rgba(255,255,255,0.06);
    --grip: rgba(255,255,255,0.22); --dot: rgba(255,255,255,0.07);
    --title: #F1F5F9; --desc: #94A3B8; --wallet-bg: rgba(255,255,255,0.04);
    --chrome: linear-gradient(180deg, #ffffff 0%, #ffffff 42%, #b6c2cf 72%, #ffffff 100%);
    --chrome-hi: rgba(255,255,255,0.2); --chrome-glow: rgba(255,255,255,0.22);
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(46,230,197,0.14) 0%, transparent 48%),
      var(--sheet-bg);
  }
  html.dark .panel-x { color: #94A3B8; }
  html.dark .modal-shell { --shell-bg: #020617; box-shadow: 0 32px 70px -22px rgba(0,0,0,0.66), inset 0 0 0 1px rgba(255,255,255,0.05); }
</style>

<div class="card" style="padding:0; background:#F8FAFC;">
  <div class="frame" data-comment-anchor="prizesheet-frame">

    <!-- ── MOBILE ───────────────────────────────────────────── -->
    <div class="demo">
      <div class="demo-cap"><span class="material-symbols-outlined">smartphone</span>Mobile · bottom sheet</div>
      <div class="device" id="device" data-screen-label="Prize sheet — mobile">
        <div class="notch"></div>
        <div class="screen">
          <div class="app">
            <div class="app-title"></div><div class="app-sub"></div>
            <div class="app-tile"></div>
            <div class="app-row"><div></div><div></div></div>
            <div class="app-tile" style="height:64px"></div>
          </div>
          <button class="fab" data-fab><span class="material-symbols-outlined">redeem</span>Claim</button>
          <div class="overlay" data-overlay></div>
          <div class="sheet panel" id="sheet">
            <div class="grip" data-grip></div>
            <canvas class="confetti"></canvas>
          </div>
          <div class="home-ind"></div>
        </div>
      </div>
      <div class="demo-hint">tap “Claim” · drag the grip or tap the dim to dismiss</div>
    </div>

    <!-- ── DESKTOP ──────────────────────────────────────────── -->
    <div class="demo">
      <div class="demo-cap"><span class="material-symbols-outlined">desktop_windows</span>Desktop · centered dialog</div>
      <div class="desktop" id="desktop" data-screen-label="Prize sheet — desktop">
        <div class="dbar">
          <span class="tl r"></span><span class="tl y"></span><span class="tl g"></span>
          <div class="durl"><span class="material-symbols-outlined">lock</span>app.deha.io/rewards</div>
        </div>
        <div class="dscreen">
          <div class="dapp">
            <div class="dapp-rail"></div>
            <div class="dapp-main">
              <div class="dapp-h"></div>
              <div class="dapp-grid"><div></div><div></div><div></div></div>
              <div class="dapp-wide"></div>
            </div>
          </div>
          <button class="fab fab-grid" data-fab data-comment-anchor="165aed4061-button"><span class="material-symbols-outlined">redeem</span>Claim prize</button>
          <div class="doverlay" data-overlay></div>
          <div class="modal-shell" data-comment-anchor="ad6fc81bc6-div">
            <div class="modal panel" id="modal">
              <button class="panel-x" data-x aria-label="Close"><span class="material-icons">close</span></button>
              <canvas class="confetti"></canvas>
            </div>
          </div>
        </div>
      </div>
      <div class="demo-hint">click “Claim reward” · tap the dim or press Esc to dismiss</div>
    </div>

  </div>
</div>

<script>
const dpr = Math.min(window.devicePixelRatio || 1, 2);
const COLORS = ['#10B981', '#22D3EE', '#A3E635', '#34D399', '#67E8F9', '#FFFFFF'];

/* ── confetti engine, bound to one canvas ── */
function makeConfetti(canvas){
  const ctx = canvas.getContext('2d');
  let parts = [], raf = null;
  function size(){ const r = canvas.getBoundingClientRect(); canvas.width = r.width*dpr; canvas.height = r.height*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let i=parts.length-1;i>=0;i--){
      const p = parts[i]; p.life++;
      p.vy += p.g; p.vx *= 0.99; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      const fade = p.life > p.ttl-26 ? Math.max(0,(p.ttl-p.life)/26) : 1;
      ctx.save(); ctx.globalAlpha = fade; ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle = p.color;
      if (p.shape==='strip') ctx.fillRect(-p.w/2,-p.h/4,p.w,p.h/2); else ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      if (p.life>=p.ttl || p.y > canvas.height/dpr + 30) parts.splice(i,1);
    }
    if (parts.length) raf = requestAnimationFrame(tick); else { raf = null; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  function burst(count, power){
    size(); const r = canvas.getBoundingClientRect();
    const ox = r.width/2, oy = r.height*0.30;
    for (let i=0;i<count;i++){
      const ang = (-Math.PI/2) + (Math.random()-0.5)*Math.PI*1.25;
      const sp = (2.6 + Math.random()*4.2)*power;
      parts.push({ x: ox+(Math.random()-0.5)*40, y: oy+(Math.random()-0.5)*20,
        vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp - Math.random()*2, g: 0.12+Math.random()*0.06,
        w: 5+Math.random()*6, h: 2+Math.random()*4, rot: Math.random()*Math.PI, vr: (Math.random()-0.5)*0.4,
        color: COLORS[(Math.random()*COLORS.length)|0], life: 0, ttl: 90+Math.random()*50,
        shape: Math.random()>0.5 ? 'rect' : 'strip' });
    }
    if (!raf) raf = requestAnimationFrame(tick);
  }
  return { burst, size };
}

/* ── shared prize content (mounted into each panel) ── */
function contentHTML(){
  return `
    <div class="prize">
      <div class="amount"><span class="cur">$</span>100</div>
      <div class="wontag">YOU WON</div>
      <div class="prize-title">Claim your prize!</div>
      <div class="prize-desc">Your first reward is here: $100 just for joining. Claim your prize and dive into crypto!</div>
    </div>
    <button class="claim-btn" data-claim><span class="material-symbols-outlined">redeem</span>Claim prize</button>
    <div class="success">
      <div class="check"><span class="material-icons">check</span></div>
      <div class="success-title">Prize claimed</div>
      <div class="success-desc">$100 has landed in your wallet. Welcome aboard.</div>
      <div class="wallet">
        <div class="wallet-l">
          <div class="wallet-ic"><span class="material-symbols-outlined">account_balance_wallet</span></div>
          <div style="text-align:left">
            <div class="wallet-lbl">Wallet balance</div>
            <div class="wallet-bal">$100.00<span class="gain">+$100</span></div>
          </div>
        </div>
        <span class="material-symbols-outlined" style="color:#10B981;font-size:22px">trending_up</span>
      </div>
    </div>`;
}

const scopes = [];
function setupScope(opts){
  const { frame, panel, openClass } = opts;
  panel.insertAdjacentHTML('beforeend', contentHTML());
  const cf = makeConfetti(panel.querySelector('.confetti'));
  const claimBtn = panel.querySelector('[data-claim]');
  let openTimer = null;

  function open(){
    panel.classList.remove('claimed'); panel.style.transform = '';
    frame.classList.add(openClass); panel.classList.add('is-open');
    clearTimeout(openTimer);
    openTimer = setTimeout(()=> cf.burst(26,1), 260);
    setTimeout(()=> cf.burst(20,0.85), 480);
  }
  function dismiss(){
    frame.classList.remove(openClass); panel.classList.remove('is-open');
    setTimeout(()=> panel.classList.remove('claimed'), 560);
  }
  function claim(){
    claimBtn.classList.add('pressed');
    cf.burst(70,1.5); setTimeout(()=> cf.burst(40,1.2), 180);
    setTimeout(()=>{ claimBtn.classList.remove('pressed'); panel.classList.add('claimed'); cf.burst(30,1); }, 220);
    setTimeout(dismiss, 2600);
  }

  opts.fab.addEventListener('click', open);
  claimBtn.addEventListener('click', claim);
  opts.overlay.addEventListener('click', dismiss);
  const x = panel.querySelector('[data-x]'); if (x) x.addEventListener('click', dismiss);
  frame.addEventListener('mouseenter', ()=>{ /* container */ });
  panel.addEventListener('mouseenter', ()=>{ if (panel.classList.contains('is-open') && !panel.classList.contains('claimed')) cf.burst(6,0.7); });

  // drag-to-dismiss (mobile bottom sheet only)
  if (opts.isMobile){
    let dragging = false, startY = 0, curY = 0;
    const H = () => panel.getBoundingClientRect().height;
    const grip = panel.querySelector('[data-grip]');
    function down(e){ if (!frame.classList.contains(openClass)) return; dragging = true; startY = (e.touches?e.touches[0].clientY:e.clientY); curY = 0; frame.classList.add('dragging'); }
    function move(e){ if (!dragging) return; const y = (e.touches?e.touches[0].clientY:e.clientY); curY = Math.max(0, y-startY); panel.style.transform = `translateY(${curY}px)`; if (e.cancelable) e.preventDefault(); }
    function up(){ if (!dragging) return; dragging = false; frame.classList.remove('dragging'); if (curY > H()*0.32) dismiss(); else panel.style.transform = ''; }
    grip.addEventListener('mousedown', down);
    panel.addEventListener('touchstart', down, { passive:true });
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move, { passive:false });
    window.addEventListener('mouseup', up);
    window.addEventListener('touchend', up);
  }

  scopes.push({ dismiss, cf });
  return { open, dismiss };
}

setupScope({
  frame: document.getElementById('device'), panel: document.getElementById('sheet'), openClass: 'sheet-open',
  fab: document.querySelector('#device [data-fab]'), overlay: document.querySelector('#device [data-overlay]'), isMobile: true
});
setupScope({
  frame: document.getElementById('desktop'), panel: document.getElementById('modal'), openClass: 'modal-open',
  fab: document.querySelector('#desktop [data-fab]'), overlay: document.querySelector('#desktop [data-overlay]'), isMobile: false
});

document.addEventListener('keydown', e=>{ if (e.key === 'Escape') scopes.forEach(s=> s.dismiss()); });
window.addEventListener('resize', ()=> scopes.forEach(s=> s.cf.size()));
</script>
<script src="_darkmode.js"></script>
</body></html>
