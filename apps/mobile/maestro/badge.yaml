- launchApp
- assertVisible: "Primitives"
- scrollUntilVisible:
    element: "BADGE"
    direction: DOWN
- assertVisible: "BADGE"
- assertVisible: "Default"
- assertVisible: "Secondary"
- assertVisible: "Outline"
- assertVisible: "Destructive"
